<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>張宇涵 - 石都國際景觀石材有限公司</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <!-- 頂部灰色 Banner -->
    <div class="h-48 md:h-64 bg-gray-500 w-full"></div>

    <!-- 主體內容區塊 -->
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 -mt-24 md:-mt-32 pb-16">
        <div class="bg-white rounded-2xl shadow-xl p-6 md:p-10 text-center">
            
            <!-- 大頭貼 (請替換為實際圖片路徑) -->
            <div class="inline-block relative">
                <img src="image_5eac62.png" alt="張宇涵" class="w-40 h-40 md:w-48 md:h-48 rounded-full object-cover border-4 border-white shadow-md mx-auto">
            </div>

            <!-- 基本資訊 -->
            <h1 class="text-3xl md:text-4xl font-bold mt-6 text-gray-900 tracking-wide">張 宇涵</h1>
            <p class="text-xl text-gray-600 mt-2 font-semibold">石都國際景觀石材有限公司</p>

            <!-- 專業標籤區 -->
            <div class="mt-6 border-t border-b border-gray-100 py-4">
                <span class="inline-block bg-blue-50 text-blue-700 text-sm font-semibold px-3 py-1 rounded-full mb-2">建築（其他）</span>
                <p class="text-sm md:text-base text-gray-500 leading-relaxed mt-2 px-4">
                    石材工程 ｜ 建築化工材料 ｜ 防水材料 ｜ 石材 ｜ 石片 ｜ 天然石片 ｜ 卵石 ｜ 版岩 ｜ 石雕 ｜ 抿石子 ｜ 石材黏著劑
                </p>
            </div>

            <!-- 快捷聯絡按鈕 -->
            <div class="flex justify-center space-x-6 my-8">
                <a href="tel:" class="w-12 h-12 rounded-full bg-red-600 text-white flex items-center justify-center hover:bg-red-700 transition duration-300 shadow-md" title="撥打電話">
                    <i class="fas fa-phone text-lg"></i>
                </a>
                <a href="mailto:" class="w-12 h-12 rounded-full bg-red-600 text-white flex items-center justify-center hover:bg-red-700 transition duration-300 shadow-md" title="發送郵件">
                    <i class="fas fa-envelope text-lg"></i>
                </a>
                <a href="#" class="w-12 h-12 rounded-full bg-red-600 text-white flex items-center justify-center hover:bg-red-700 transition duration-300 shadow-md" title="更多資訊">
                    <i class="fas fa-ellipsis-h text-lg"></i>
                </a>
            </div>

        </div>

        <!-- 詳細聯絡資訊底欄 -->
        <div class="bg-gray-100 rounded-xl p-6 mt-6 text-center text-sm md:text-base text-gray-600 leading-loose shadow-sm">
            <p class="font-semibold text-gray-800">張 宇涵</p>
            <p>石都國際景觀石材有限公司</p>
            <p><i class="fas fa-map-marker-alt text-red-500 mr-2"></i>西區北港路1311號, 嘉義市, 600</p>
        </div>
    </div>

</body>
</html>
