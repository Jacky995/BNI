<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE Bot 工具訓練營</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c11; --bg2:#0d1018;
    --panel:rgba(255,255,255,.045);
    --panel2:rgba(255,255,255,.07);
    --line:rgba(255,255,255,.10);
    --gold:#ffc24b; --gold-soft:#ffd887; --gold-dim:#9a7327;
    --green:#06c755; --green-d:#04a847;
    --red:#ff5a5a; --amber:#ffb020;
    --txt:#eceef4; --mut:#8d94a6; --mut2:#5d6273;
    --chat:#94adcb; --card:#ffffff; --ink:#202124; --ink2:#5f6368; --ink3:#9aa0a6;
    --r:18px;
    --disp:"Chakra Petch","Noto Sans TC",system-ui,sans-serif;
    --body:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:var(--body); color:var(--txt);
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(255,194,75,.10), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(6,199,85,.08), transparent 55%),
      linear-gradient(160deg,#0a0c11,#0d1018 60%,#0a0c11);
    background-attachment:fixed;
    min-height:100%;
    padding:22px 16px 60px;
    overflow-x:hidden;
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; opacity:.5; z-index:0;
    background-image:radial-gradient(rgba(255,255,255,.045) 1px, transparent 1px);
    background-size:30px 30px;
    mask-image:linear-gradient(180deg, transparent, #000 30%, #000 70%, transparent);
  }
  .wrap{position:relative; z-index:1; max-width:1040px; margin:0 auto;}

  /* ── header ── */
  .top{display:flex; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap}
  .badge{
    width:46px;height:46px;border-radius:13px;flex:0 0 auto;
    background:linear-gradient(135deg,var(--gold),#e0901f);
    display:grid;place-items:center;font-family:var(--disp);font-weight:700;
    color:#241a05;font-size:13px;letter-spacing:.5px;line-height:1;text-align:center;
    box-shadow:0 6px 20px rgba(255,194,75,.28);
  }
  .ttl{display:flex;flex-direction:column;gap:2px}
  .ttl h1{font-family:var(--disp);font-weight:700;font-size:clamp(20px,4.5vw,30px);letter-spacing:.5px;line-height:1.05}
  .ttl h1 .g{color:var(--gold)}
  .ttl p{color:var(--mut);font-size:12.5px;letter-spacing:.3px}
  .stat{margin-left:auto;display:flex;gap:10px;align-items:center}
  .xp{font-family:var(--disp);font-weight:700;color:var(--gold);font-size:15px;
     background:var(--panel);border:1px solid var(--line);padding:7px 13px;border-radius:11px;white-space:nowrap}
  .xp small{color:var(--mut);font-weight:500;font-size:11px;font-family:var(--body)}

  /* ── progress rail ── */
  .rail{display:flex;gap:6px;margin-bottom:20px}
  .seg{flex:1;height:7px;border-radius:6px;background:var(--panel2);position:relative;overflow:hidden;cursor:not-allowed;transition:.2s}
  .seg.on{cursor:pointer}
  .seg.on:hover{transform:translateY(-1px)}
  .seg i{position:absolute;inset:0;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-soft));transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .seg.done i{width:100%}
  .seg.cur i{width:50%}
  .seg.cur{box-shadow:0 0 0 1.5px var(--gold), 0 0 16px rgba(255,194,75,.35)}

  /* ── layout ── */
  .grid{display:grid;grid-template-columns:1fr 348px;gap:26px;align-items:start}
  @media(max-width:820px){.grid{grid-template-columns:1fr;gap:20px}.side{order:-1}}

  /* ── side panel (guide) ── */
  .side{display:flex;flex-direction:column;gap:16px;position:sticky;top:18px}
  @media(max-width:820px){.side{position:static}}
  .card-p{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;backdrop-filter:blur(8px)}
  .lvtag{display:inline-flex;align-items:center;gap:7px;font-family:var(--disp);font-weight:600;font-size:11px;letter-spacing:1.4px;color:var(--gold);text-transform:uppercase;margin-bottom:9px}
  .lvtag .n{background:var(--gold);color:#241a05;border-radius:6px;padding:2px 7px;letter-spacing:.5px}
  .guide-h{font-size:19px;font-weight:900;letter-spacing:.3px;margin-bottom:3px}
  .guide-s{color:var(--mut);font-size:12.5px;margin-bottom:14px}
  .mentor{display:flex;gap:11px;align-items:flex-start}
  .mentor .av{width:38px;height:38px;flex:0 0 auto;border-radius:11px;background:linear-gradient(135deg,#15321f,#0c2014);display:grid;place-items:center;border:1px solid rgba(6,199,85,.4)}
  .bubble-g{background:var(--panel2);border:1px solid var(--line);border-radius:13px;border-top-left-radius:3px;padding:12px 13px;font-size:13.5px;line-height:1.62;color:#dfe3ee}
  .bubble-g b{color:var(--gold-soft);font-weight:700}
  .bubble-g code{font-family:var(--disp);font-size:12px;background:rgba(255,194,75,.12);color:var(--gold-soft);padding:1px 6px;border-radius:5px}

  .task{display:flex;gap:10px;align-items:center;font-size:12.5px;color:var(--amber);background:rgba(255,176,32,.08);border:1px dashed rgba(255,176,32,.35);border-radius:11px;padding:11px 13px}
  .task.done{color:var(--green);background:rgba(6,199,85,.09);border-color:rgba(6,199,85,.4)}
  .task .ic{font-size:15px}

  .recap{border-left:3px solid var(--gold);padding:2px 0 2px 13px;font-size:12.5px;line-height:1.6;color:#cdd2de;display:none}
  .recap.show{display:block;animation:fade .4s}
  .recap b{color:var(--gold-soft)}
  .recap-t{font-family:var(--disp);font-size:11px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}

  .nav{display:flex;gap:10px}
  .btn{flex:1;font-family:var(--body);font-weight:700;font-size:14px;border:none;border-radius:13px;padding:14px;cursor:pointer;transition:.18s;letter-spacing:.3px}
  .btn:active{transform:scale(.97)}
  .btn-ghost{background:var(--panel2);color:var(--mut);border:1px solid var(--line)}
  .btn-ghost:hover{color:var(--txt)}
  .btn-go{background:linear-gradient(135deg,var(--gold),#e0901f);color:#241a05;box-shadow:0 6px 20px rgba(255,194,75,.25)}
  .btn-go:disabled{background:var(--panel2);color:var(--mut2);box-shadow:none;cursor:not-allowed}
  .btn-go.pulse{animation:pulse 1.3s ease-in-out infinite}

  /* ── phone ── */
  .stage{display:flex;justify-content:center}
  .phone{
    width:340px;max-width:94vw;height:660px;max-height:78vh;
    background:#05070b;border-radius:42px;padding:11px;
    box-shadow:0 30px 70px rgba(0,0,0,.6), inset 0 0 0 2px rgba(255,255,255,.06), 0 0 0 1px rgba(255,194,75,.10);
    position:relative;
  }
  .notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#05070b;border-radius:0 0 16px 16px;z-index:30}
  .scr{width:100%;height:100%;border-radius:33px;overflow:hidden;display:flex;flex-direction:column;background:var(--chat);position:relative}
  .lbar{background:var(--green);color:#fff;padding:13px 15px 11px;display:flex;align-items:center;gap:10px;flex:0 0 auto;z-index:20}
  .lbar .bk{font-size:19px;opacity:.9}
  .lbar .ava{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.22);display:grid;place-items:center;font-size:15px}
  .lbar .nm{font-weight:700;font-size:15px}
  .lbar .nm small{display:block;font-weight:400;font-size:10px;opacity:.85}
  .lbar .rt{margin-left:auto;font-size:17px;opacity:.85}

  .chat{flex:1;overflow-y:auto;padding:16px 13px 8px;display:flex;flex-direction:column;gap:11px;scroll-behavior:smooth}
  .chat::-webkit-scrollbar{width:0}
  .row{display:flex;gap:7px;max-width:100%;animation:pop .35s cubic-bezier(.2,.9,.3,1)}
  .row.me{flex-direction:row-reverse}
  .av-s{width:28px;height:28px;border-radius:9px;flex:0 0 auto;background:#fff;display:grid;place-items:center;font-size:14px;box-shadow:0 1px 3px rgba(0,0,0,.15)}
  .txt-b{background:#fff;color:var(--ink);padding:9px 12px;border-radius:15px;border-top-left-radius:4px;font-size:13.5px;line-height:1.5;max-width:215px;box-shadow:0 1px 2px rgba(0,0,0,.12)}
  .me .txt-b{background:var(--green);color:#fff;border-radius:15px;border-top-right-radius:4px}
  .sys{align-self:center;background:rgba(0,0,0,.32);color:#fff;font-size:11px;padding:4px 11px;border-radius:11px;backdrop-filter:blur(4px)}

  /* Flex card */
  .flex-card{background:var(--card);border-radius:14px;overflow:hidden;width:248px;box-shadow:0 4px 14px rgba(0,0,0,.22)}
  .fc-head{padding:13px 15px;display:flex;align-items:center;justify-content:space-between;color:#fff;font-weight:700;font-size:13px;transition:background .3s}
  .fc-head .dot{display:inline-flex;align-items:center;gap:7px}
  .fc-head .dot i{width:9px;height:9px;border-radius:50%;background:#fff;box-shadow:0 0 7px rgba(255,255,255,.7)}
  .fc-body{padding:14px 15px 16px}
  .fc-title{font-size:18px;font-weight:900;color:var(--ink);line-height:1.2}
  .fc-sub{font-size:12px;color:var(--ink2);margin-top:3px}
  .fc-loc{font-size:11.5px;color:var(--ink2);margin-top:7px;line-height:1.45;display:flex;gap:4px}
  .fc-sep{height:1px;background:#eceef1;margin:13px 0}
  .kv{display:flex;gap:8px;margin-bottom:9px;font-size:12.5px}
  .kv .k{color:var(--ink3);flex:0 0 42px}
  .kv .v{color:var(--ink);font-weight:700;flex:1;word-break:break-word;line-height:1.45}
  .fc-btns{padding:0 13px 13px;display:flex;flex-direction:column;gap:7px}
  .fc-btn{border:none;border-radius:9px;padding:11px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:var(--body);transition:.15s}
  .fc-btn:active{transform:scale(.97);filter:brightness(.93)}
  .fc-btn.tag{background:#2b3a4a;font-size:11px;padding:7px;align-self:flex-start;border-radius:20px;color:#fff;opacity:.92}

  /* carousel */
  .caro-wrap{position:relative;width:268px}
  .caro{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:4px;scrollbar-width:none}
  .caro::-webkit-scrollbar{display:none}
  .caro .flex-card{scroll-snap-align:center;flex:0 0 auto;width:200px}
  .caro .hero{height:118px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;font-weight:900;text-align:center;line-height:1.15;padding:10px;white-space:pre-line}
  .caro-nav{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.9);color:#333;font-size:16px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.25);z-index:5;display:grid;place-items:center}
  .caro-nav:active{transform:translateY(-50%) scale(.9)}
  .cn-l{left:-6px} .cn-r{right:-6px}

  /* input bar + quick reply + rich menu */
  .below{flex:0 0 auto;position:relative}
  .qr{display:flex;gap:7px;overflow-x:auto;padding:9px 11px;scrollbar-width:none;background:transparent}
  .qr::-webkit-scrollbar{display:none}
  .qr-chip{flex:0 0 auto;background:#fff;color:var(--green-d);border:1.5px solid var(--green);border-radius:18px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.15s}
  .qr-chip:active{transform:scale(.95);background:var(--green);color:#fff}
  .inbar{background:#fff;border-top:1px solid #e4e7ec;padding:9px 12px;display:flex;align-items:center;gap:9px}
  .inbar .pl{flex:1;background:#f0f2f5;border-radius:18px;padding:8px 13px;color:#9aa0a6;font-size:12.5px}
  .inbar .ic{font-size:18px;color:#8b93a3}

  .richmenu{background:#1f2630;color:#fff}
  .rm-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.1)}
  .rm-tab{flex:1;text-align:center;padding:8px;font-size:11px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
  .rm-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
  .rm-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:rgba(255,255,255,.08);padding:1px}
  .rm-cell{background:#262e3a;padding:14px 6px;text-align:center;cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:4px;align-items:center}
  .rm-cell:active{background:#313b49}
  .rm-cell .e{font-size:20px}
  .rm-cell .t{font-size:10.5px;color:#cfd5df}

  /* overlay sheets */
  .ov{position:absolute;inset:0;z-index:40;display:none}
  .ov.show{display:block;animation:fade .25s}
  .ov-bg{position:absolute;inset:0;background:rgba(0,0,0,.45)}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:20px 20px 0 0;padding:18px 17px 22px;transform:translateY(100%);animation:up .32s cubic-bezier(.2,.85,.25,1) forwards;max-height:88%;overflow-y:auto}
  .sh-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .sh-h .t{font-weight:900;font-size:16px;color:var(--ink)}
  .sh-h .x{font-size:20px;color:#9aa0a6;cursor:pointer}
  .sh-h .liff{font-size:10px;background:var(--green);color:#fff;padding:2px 8px;border-radius:10px;font-weight:700}
  .fld{margin-bottom:13px}
  .fld label{display:block;font-size:11.5px;color:var(--ink3);margin-bottom:5px;font-weight:700}
  .fld input,.fld select{width:100%;border:1.5px solid #e1e5ea;border-radius:10px;padding:11px 12px;font-size:14px;font-family:var(--body);color:var(--ink);background:#fff}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--green)}
  .sh-go{width:100%;background:var(--green);color:#fff;border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--body);margin-top:4px}
  .sh-go:active{transform:scale(.98)}

  .center-ov{position:absolute;inset:0;display:grid;place-items:center;text-align:center;color:#fff;padding:24px}
  .center-ov .big{font-size:60px;margin-bottom:12px;animation:pop .4s}
  .center-ov .t{font-size:16px;font-weight:700;margin-bottom:18px}
  .center-ov .close{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:11px;padding:10px 22px;font-size:13px;cursor:pointer;font-family:var(--body)}

  /* gallery (other msg types) */
  .gal-tabs{display:flex;gap:6px;flex-wrap:wrap}
  .gal-tab{background:rgba(0,0,0,.3);color:#fff;border:none;border-radius:9px;padding:7px 12px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:var(--body);transition:.15s}
  .gal-tab:active{transform:scale(.95)}
  .gal-tab.seen{background:rgba(6,199,85,.85)}
  .sticker-b{font-size:64px;background:transparent;align-self:flex-start}
  .img-b{width:200px;height:130px;border-radius:14px;background:linear-gradient(135deg,#3a7bd5,#00d2ff);display:flex;align-items:flex-end;padding:10px;color:#fff;font-size:12px;font-weight:700;box-shadow:0 3px 12px rgba(0,0,0,.2)}
  .loc-b{width:210px;border-radius:14px;overflow:hidden;background:#fff;box-shadow:0 3px 12px rgba(0,0,0,.2)}
  .loc-map{height:110px;background:
     linear-gradient(rgba(120,170,120,.25),rgba(120,170,120,.25)),
     repeating-linear-gradient(0deg,#e8ede4,#e8ede4 18px,#dfe6da 18px,#dfe6da 19px),
     repeating-linear-gradient(90deg,#e8ede4,#e8ede4 24px,#dfe6da 24px,#dfe6da 25px);
     position:relative}
  .loc-map .pin{position:absolute;top:38%;left:46%;font-size:26px}
  .loc-info{padding:10px 12px;font-size:12px;color:var(--ink)}
  .loc-info b{display:block;font-size:13px}
  .confirm-b{background:#fff;border-radius:14px;overflow:hidden;width:230px;box-shadow:0 3px 12px rgba(0,0,0,.2)}
  .confirm-t{padding:18px 16px;font-size:14px;color:var(--ink);text-align:center;font-weight:500}
  .confirm-btns{display:flex;border-top:1px solid #eee}
  .confirm-btns button{flex:1;border:none;background:#fff;padding:12px;font-size:13px;font-weight:700;color:var(--green-d);cursor:pointer;font-family:var(--body)}
  .confirm-btns button:first-child{border-right:1px solid #eee}
  .confirm-btns button:active{background:#f5f7f9}
  .imgmap{width:220px;height:160px;border-radius:12px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;background:#1f2630}
  .imgmap div{display:grid;place-items:center;color:#fff;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;text-align:center;padding:4px}
  .imgmap div:active{filter:brightness(1.3)}

  /* push economics */
  .quota-box{background:#fff;border-radius:14px;padding:15px;width:240px;box-shadow:0 3px 12px rgba(0,0,0,.2)}
  .quota-box .qh{font-size:13px;font-weight:900;color:var(--ink);margin-bottom:10px}
  .qbar{height:14px;border-radius:8px;background:#eceef1;overflow:hidden;margin-bottom:6px}
  .qbar i{display:block;height:100%;width:100%;background:var(--green);transition:width 1.1s cubic-bezier(.4,0,.2,1);border-radius:8px}
  .qmeta{font-size:11px;color:var(--ink2);display:flex;justify-content:space-between}
  .qmeta b{font-weight:800}
  .qchoice{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .qopt{text-align:left;background:#f5f7f9;border:1.5px solid #e4e7ec;border-radius:10px;padding:11px 12px;font-size:12px;cursor:pointer;font-family:var(--body);color:var(--ink);font-weight:600;transition:.15s}
  .qopt:active{transform:scale(.98)}
  .qopt.picked-bad{border-color:var(--red);background:#fff0f0}
  .qopt.picked-good{border-color:var(--green);background:#f0fbf4}
  .qverdict{margin-top:11px;font-size:12px;line-height:1.55;padding:11px;border-radius:10px;display:none}
  .qverdict.bad{display:block;background:#fff0f0;color:#b42318}
  .qverdict.good{display:block;background:#f0fbf4;color:#067647}

  /* float xp */
  .floatxp{position:fixed;font-family:var(--disp);font-weight:700;color:var(--gold);font-size:22px;pointer-events:none;z-index:99;animation:floaty 1.1s ease-out forwards;text-shadow:0 2px 12px rgba(255,194,75,.5)}

  /* graduation */
  .grad{text-align:center;padding:30px 20px}
  .grad .crown{font-size:64px;animation:pop .5s}
  .grad h2{font-family:var(--disp);font-weight:700;font-size:30px;color:var(--gold);margin:8px 0 4px;letter-spacing:1px}
  .grad .sub{color:var(--mut);font-size:13.5px;margin-bottom:22px;line-height:1.6}
  .grad-list{display:grid;grid-template-columns:1fr 1fr;gap:9px;max-width:560px;margin:0 auto 24px;text-align:left}
  @media(max-width:560px){.grad-list{grid-template-columns:1fr}}
  .grad-item{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;gap:10px;align-items:center;font-size:13px}
  .grad-item .ck{color:var(--green);font-size:16px}
  .grad-item b{font-weight:700}
  .grad-item small{display:block;color:var(--mut);font-size:11px;font-weight:400;margin-top:2px}
  .grad-cta{max-width:520px;margin:0 auto;background:linear-gradient(135deg,rgba(255,194,75,.12),rgba(255,194,75,.04));border:1px solid rgba(255,194,75,.3);border-radius:14px;padding:18px 20px;font-size:14px;line-height:1.7;color:#e7ebf3}
  .grad-cta b{color:var(--gold-soft)}
  .restart{margin-top:18px;background:var(--panel2);border:1px solid var(--line);color:var(--mut);border-radius:11px;padding:11px 24px;font-size:13px;cursor:pointer;font-family:var(--body)}
  .restart:hover{color:var(--txt)}

  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:none}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes up{to{transform:translateY(0)}}
  @keyframes pulse{0%,100%{box-shadow:0 6px 20px rgba(255,194,75,.25)}50%{box-shadow:0 6px 28px rgba(255,194,75,.6)}}
  @keyframes floaty{0%{opacity:0;transform:translateY(0)}20%{opacity:1}100%{opacity:0;transform:translateY(-60px)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="badge">LINE<br>BOT</div>
    <div class="ttl">
      <h1>工具<span class="g">訓練營</span></h1>
      <p>8 關手機模擬器 · 親手點過一輪就學會</p>
    </div>
    <div class="stat">

    </div>
  </div>

  <div class="rail" id="rail"></div>

  <div id="main">
    <div class="grid">
      <!-- phone -->
      <div class="stage">
        <div class="phone">
          <div class="notch"></div>
          <div class="scr">
            <div class="lbar">
              <span class="bk">‹</span>
              <span class="ava">🤖</span>
              <span class="nm" id="botName">FAMI 派工 bot<small id="botSub">線上</small></span>

            </div>
            <div class="chat" id="chat"></div>
            <div class="below" id="below"></div>

        </div>
      </div>

      <div class="side">
        <div class="card-p">
          <div class="lvtag"><span class="n" id="lvN">01</span> <span id="lvTool">FLEX CARD</span></div>

          <div class="guide-s" id="lvSub">—</div>

            <div class="av">🤖</div>
            <div class="bubble-g" id="guideText">—</div>
          </div>
        </div>

        <div class="task" id="task"><span class="ic">◷</span> <span id="taskText">—</span></div>

        <div class="card-p">
          <div class="recap" id="recap">
            <div class="recap-t">⚑ 關鍵心法</div>
            <div id="recapText"></div>
          </div>
          <div class="nav" style="margin-top:14px">
            <button class="btn btn-ghost" id="prevBtn" onclick="prevLv()">‹ 上一關</button>
            <button class="btn btn-go" id="nextBtn" onclick="nextLv()" disabled>完成任務解鎖 →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
"use strict";

/* ════════════ 狀態 ════════════ */
const TOTAL = 8, XP_EACH = 25;
const state = { lv:0, max:0, xp:0, done:Array(TOTAL).fill(false) };

const $ = s => document.querySelector(s);
const chat = $('#chat'), below = $('#below'), ov = $('#ov');

/* ════════════ 手機輔助 ════════════ */
function clearPhone(){ chat.innerHTML=''; below.innerHTML=''; ov.className='ov'; ov.innerHTML=''; }
function scrollDown(){ requestAnimationFrame(()=>{ chat.scrollTop = chat.scrollHeight; }); }
function addToChat(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); const node=d.firstElementChild; chat.appendChild(node); scrollDown(); return node; }
function botText(t){ return addToChat(`<div class="row"><div class="av-s">🤖</div><div class="txt-b">${t}</div></div>`); }
function meText(t){ return addToChat(`<div class="row me"><div class="av-s">🙂</div><div class="txt-b">${t}</div></div>`); }
function sysNote(t){ return addToChat(`<div class="sys">${t}</div>`); }

const STATUS = {
  '已完成':{head:'#06c755'}, '待處理':{head:'#3b82f6'}, '未完成':{head:'#ef4444'}, '延期':{head:'#f59e0b'}
};
const PAY = { '收現':'#06c755','已匯款':'#06c755','月結':'#202124','待匯款':'#f59e0b','未收款':'#ef4444' };

/* 真實回報卡（對應你 FAMI 系統） */
function flexCard(d){
  const head = (STATUS[d.status]||{head:'#475569'}).head;
  const payColor = PAY[d.pay]||'#202124';
  return `
  <div class="row"><div class="av-s">🤖</div>
    <div class="flex-card">
      <div class="fc-head" style="background:${head}">
        <span class="dot"><i></i>${d.headLabel||'現場回報'}</span><span>${d.status||''}</span>
      </div>
      <div class="fc-body">
        <div class="fc-title">${d.name||''}</div>
        <div class="fc-sub">${d.detail||''}</div>
        ${d.loc?`<div class="fc-loc">📍 ${d.loc}</div>`:''}
        <div class="fc-sep"></div>
        <div class="kv"><span class="k">單號</span><span class="v">${d.no||'—'}</span></div>
        <div class="kv"><span class="k">人員</span><span class="v">${d.who||'—'}</span></div>
        <div class="kv"><span class="k">收款</span><span class="v" style="color:${payColor}">${d.pay||'—'}</span></div>
        <div class="kv"><span class="k">金額</span><span class="v">$${d.fee||'0'}</span></div>
        ${d.result?`<div class="kv"><span class="k">結果</span><span class="v" style="font-weight:500">${d.result}</span></div>`:''}
      </div>
    </div>
  </div>`;
}

/* ════════════ 8 關內容 ════════════ */
const LEVELS = [
{
  tool:'FLEX BUBBLE', title:'Flex 卡片（bubble）', sub:'你 FAMI 在用的回報卡',
  bot:['FAMI 派工 bot','現場回報'],
  guide:`這就是你的回報卡。秘密在<b>「每一列是一個 box」</b>：label 給小 <code>flex</code>、value 給大 <code>flex</code> 並 <code>wrap:true</code>，長地址才不會貼到最左邊垮版。<br><br>頂色由<b>狀態</b>決定。下面按鈕切切看，看顏色怎麼編碼語意。`,
  task:'切換狀態 / 收款，看卡片顏色變化',
  recap:`<b>altText 一定要填</b>，否則通知列與不支援環境會空白。狀態頂色＋收款顏色（綠=已收、紅=未收、琥珀=待匯）讓主管一眼掃完，這是純文字通知做不到的。`,
  setup(){
    let st='已完成', pay='收現';
    const card = ()=>flexCard({headLabel:'現場回報',status:st,name:'許先生 / 張怡君',detail:'更換檯面盆龍頭',loc:'台中市南屯區萬和路二段31–35號10F（我愛我家）',no:'M-1150529008',who:'晏',pay,fee:'4000',result:'安裝 CPS-2104C 客臥，報價主臥 CPS-2104C ＋鋼絲管＋45度彎 $5000'});
    let node = addToChat(card());
    sysNote('👇 點下面的按鈕切換看看');
    below.innerHTML = `<div class="qr">
      <button class="qr-chip" id="bSt">切換狀態</button>
      <button class="qr-chip" id="bPay">切換收款</button>
    </div>`;
    const stCycle=['已完成','待處理','未完成','延期'], payCycle=['收現','未收款','待匯款','月結'];
    const redraw=()=>{ const fresh=document.createElement('div'); fresh.innerHTML=card().trim(); node.replaceWith(fresh.firstElementChild); node=fresh.firstElementChild; markDone(); };
    $('#bSt').onclick=()=>{ st=stCycle[(stCycle.indexOf(st)+1)%4]; redraw(); };
    $('#bPay').onclick=()=>{ pay=payCycle[(payCycle.indexOf(pay)+1)%4]; redraw(); };
  }
},
{
  tool:'CAROUSEL', title:'Flex 輪播（carousel）', sub:'多張卡片左右滑',
  bot:['BNI 副主席 bot','選單'],
  guide:`多張 bubble 並排、左右滑，就是 carousel。重點：<b>一個 carousel 只算 1 則訊息</b>，裡面最多塞 12 張。<br><br>就是你傳的那種選單。滑到最後一張解鎖。`,
  task:'滑到最後一張卡片',
  recap:`carousel 適合「<b>現在給你一排選項</b>」的當下回應。但若是每天都要點的常用捷徑，它會隨對話捲走——那種該用 Rich Menu（第 5 關）。`,
  setup(){
    botText('您好！這是副主席常用作業 👇');
    const cards=[
      {c:'#1E9BF0',t:'上傳\n約申請書',tag:'副主席作業',b:'開始上傳'},
      {c:'#5CB85C',t:'申請\n信用',tag:'副主席作業',b:'前往申請'},
      {c:'#9b59b6',t:'會員\n名冊',tag:'副主席作業',b:'查看名冊'},
    ];
    const inner = cards.map(c=>`
      <div class="flex-card">
        <div class="hero" style="background:${c.c}">${c.t}</div>
        <div class="fc-btns" style="padding:11px"><button class="fc-btn" style="background:${c.c}">${c.b}</button></div>
      </div>`).join('');
    addToChat(`<div class="row"><div class="av-s">🤖</div>
      <div class="caro-wrap">
        <div class="caro" id="caro">${inner}</div>
        <button class="caro-nav cn-l" id="cl">‹</button>
        <button class="caro-nav cn-r" id="cr">›</button>
      </div></div>`);
    const c=$('#caro');
    $('#cl').onclick=()=>c.scrollBy({left:-210,behavior:'smooth'});
    $('#cr').onclick=()=>c.scrollBy({left:210,behavior:'smooth'});
    c.addEventListener('scroll',()=>{ if(c.scrollLeft + c.clientWidth >= c.scrollWidth - 12) markDone(); });
    c.querySelectorAll('.fc-btn').forEach(b=>b.onclick=()=>sysNote('（按鈕綁 action，下一關教）'));
  }
},
{
  tool:'ACTIONS', title:'Action 類型', sub:'按鈕能觸發什麼',
  bot:['FAMI 派工 bot','互動'],
  guide:`按鈕、圖、文字都能綁 action。<b>點點看每一種</b>，看手機裡發生什麼——尤其注意 <code>postback</code>：它讓後端做事卻<b>不洗版</b>。`,
  task:'試 3 種以上 action',
  recap:`<b>postback</b> 最關鍵：觸發 <code>doPost</code> 做事、不留使用者訊息。<code>uri</code> 開 LIFF／網頁／<code>tel:</code> 撥號。<code>datetimepicker</code> 跳日曆做預約。<code>camera</code> 直接拍照回報。`,
  setup(){
    botText('這張卡的每顆按鈕是不同 action，點點看 👇');
    const tried=new Set();
    addToChat(`<div class="row"><div class="av-s">🤖</div>
      <div class="flex-card">
        <div class="fc-head" style="background:#475569"><span class="dot"><i></i>action 實驗室</span></div>
        <div class="fc-btns" style="padding:14px">
          <button class="fc-btn" style="background:#06c755" data-a="postback">postback · 標記完成</button>
          <button class="fc-btn" style="background:#3b82f6" data-a="uri">uri · 開 LIFF 表單</button>
          <button class="fc-btn" style="background:#8b5cf6" data-a="message">message · 替我送字</button>
          <button class="fc-btn" style="background:#f59e0b" data-a="datetime">datetimepicker · 選日期</button>
          <button class="fc-btn" style="background:#ef4444" data-a="camera">camera · 拍照</button>
        </div>
      </div></div>`);
    const fns={
      postback:()=>{ sysNote('postback 觸發後端…'); botText('✅ 已標記完成（沒有產生你的訊息泡泡，這就是不洗版）'); },
      uri:()=>{ sysNote('uri → 開啟外部連結 / LIFF（會跳出網頁）'); },
      message:()=>{ meText('我要報價單'); botText('收到，幫你準備報價 📝'); },
      datetime:()=>{ ov.className='ov show'; ov.innerHTML=`<div class="ov-bg"></div><div class="sheet"><div class="sh-h"><span class="t">選擇日期</span><span class="x">✕</span></div><div class="fld"><input type="date"></div><button class="sh-go">確定</button></div>`; ov.querySelector('.x').onclick=close; ov.querySelector('.sh-go').onclick=()=>{close();botText('已預約 ✅');}; function close(){ov.className='ov';} },
      camera:()=>{ ov.className='ov show'; ov.innerHTML=`<div class="ov-bg" style="background:#000"></div><div class="center-ov"><div class="big">📷</div><div class="t">（模擬）相機已開啟<br>師傅可直接拍現場照</div><button class="close">關閉</button></div>`; ov.querySelector('.close').onclick=()=>ov.className='ov'; },
    };
    chat.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{ fns[b.dataset.a](); tried.add(b.dataset.a); if(tried.size>=3) markDone(); });
  }
},
{
  tool:'QUICK REPLY', title:'Quick Reply', sub:'你漏掉的：輸入框上方快捷鈕',
  bot:['FAMI 派工 bot','查詢'],
  guide:`Quick Reply 是貼在<b>輸入框上方</b>的一排快捷鈕，<b>點完就消失</b>。用來收斂「接下來只能選這幾個」，又不佔對話版面。<br><br>bot 問你問題了，看下面 👇`,
  task:'點一個快捷鈕回答',
  recap:`跟 Flex 按鈕不同：Quick Reply <b>點完即走、不留在對話裡</b>，適合臨時收斂選項（選日期、選分店、是否確認）。Flex 卡片則會留在對話中當紀錄。`,
  setup(){
    botText('要查哪一張單？👇');
    below.innerHTML=`<div class="qr" id="qr">
      <button class="qr-chip">📋 待處理</button>
      <button class="qr-chip">💰 未收款</button>
      <button class="qr-chip">✅ 今日完成</button>
      <button class="qr-chip">🔍 搜尋地址</button>
    </div>
    <div class="inbar"><span class="ic">＋</span><span class="pl">輸入訊息…</span><span class="ic">🙂</span></div>`;
    $('#qr').querySelectorAll('.qr-chip').forEach(c=>c.onclick=()=>{
      const label=c.textContent;
      meText(label);
      $('#qr').style.display='none';            // 點完消失
      setTimeout(()=>botText(`好的，幫你查「${label.replace(/[^一-龥]/g,'')}」的單…`),250);
      markDone();
    });
  }
},
{
  tool:'RICH MENU', title:'Rich Menu', sub:'釘在底部、可多層切換',
  bot:['J·KEY 客服 bot','常用'],
  guide:`Rich Menu <b>永遠釘在輸入框下方</b>，不會被對話捲走。還能做多張、用 <code>richmenuswitch</code> 切分頁。<br><br>下面有兩個分頁，<b>切換看看</b> 👇`,
  task:'切換到第二個分頁',
  recap:`常用捷徑放這裡。你截圖那種「副主席作業」如果是<b>天天點</b>的，比 carousel 更適合做成 Rich Menu。多層切換適合：客戶頁 / 員工頁分開。`,
  setup(){
    botText('歡迎！下方選單隨時可用 👇');
    below.innerHTML=`<div class="richmenu">
      <div class="rm-tabs">
        <div class="rm-tab on" data-p="0">📌 主選單</div>
        <div class="rm-tab" data-p="1">🛠 進階作業</div>
      </div>
      <div class="rm-grid" id="rmGrid"></div>
    </div>`;
    const pages=[
      [['📋','派工'],['💰','收款'],['📞','聯絡'],['📊','報表'],['🗓','預約'],['❓','說明']],
      [['⬆️','上傳'],['🔐','權限'],['👥','名冊'],['📝','報價'],['🔄','同步'],['🏠','回主選單']],
    ];
    const draw=p=>{ $('#rmGrid').innerHTML = pages[p].map(c=>`<div class="rm-cell"><span class="e">${c[0]}</span><span class="t">${c[1]}</span></div>`).join(''); };
    draw(0);
    below.querySelectorAll('.rm-tab').forEach(t=>t.onclick=()=>{
      below.querySelectorAll('.rm-tab').forEach(x=>x.classList.remove('on'));
      t.classList.add('on'); const p=+t.dataset.p; draw(p);
      if(p===1){ sysNote('richmenuswitch → 已切換到進階分頁'); markDone(); }
    });
  }
},
{
  tool:'LIFF FORM', title:'LIFF 表單', sub:'你整套系統的輸入心臟',
  bot:['FAMI 派工 bot','回報'],
  guide:`LIFF＝<b>在 LINE 裡開的網頁</b>。多欄輸入都靠它，還能拿到 <code>userId</code>。送出後用 <code>google.script.run</code> 寫回 Ragic，bot 再回一張卡。<br><br>點「填寫回報」走一次完整流程 👇`,
  task:'填表單並送出，看 bot 回卡',
  recap:`這就是你系統的閉環：<b>LIFF 表單 → GAS → Ragic → 回一張 Flex 卡</b>。鐵則：<b>只留一條輸入路徑</b>，別同時養文字指令＋選單＋表單，少一條路就少一批 bug。`,
  setup(){
    botText('要回報這張單嗎？');
    addToChat(`<div class="row"><div class="av-s">🤖</div>
      <div class="flex-card">
        <div class="fc-head" style="background:#3b82f6"><span class="dot"><i></i>待回報</span><span>待處理</span></div>
        <div class="fc-body"><div class="fc-title">王太太</div><div class="fc-sub">廚房水槽更換</div></div>
        <div class="fc-btns"><button class="fc-btn" style="background:#3b82f6" id="openLiff">📝 填寫回報</button></div>
      </div></div>`);
    $('#openLiff').onclick=()=>{
      ov.className='ov show';
      ov.innerHTML=`<div class="ov-bg"></div>
        <div class="sheet">
          <div class="sh-h"><span class="t">現場回報 <span class="liff">LIFF</span></span><span class="x" id="liffX">✕</span></div>
          <div class="fld"><label>客戶</label><input id="f_name" value="王太太"></div>
          <div class="fld"><label>處理結果</label><input id="f_result" placeholder="例：已更換 SUS304 水槽"></div>
          <div class="fld"><label>金額</label><input id="f_fee" type="number" value="3500"></div>
          <div class="fld"><label>收款方式</label>
            <select id="f_pay"><option>收現</option><option>已匯款</option><option>待匯款</option><option>未收款</option><option>月結</option></select>
          </div>
          <button class="sh-go" id="liffGo">送出回報</button>
        </div>`;
      $('#liffX').onclick=()=>ov.className='ov';
      $('#liffGo').onclick=()=>{
        const name=$('#f_name').value||'王太太', result=$('#f_result').value||'已完成處理', fee=$('#f_fee').value||'0', pay=$('#f_pay').value;
        ov.className='ov';
        sysNote('google.script.run → 寫入 Ragic ✓');
        setTimeout(()=>{ const d=document.createElement('div'); d.innerHTML=flexCard({headLabel:'現場回報',status:'已完成',name,detail:'廚房水槽更換',no:'M-115060101',who:'你',pay,fee,result}).trim(); chat.appendChild(d.firstElementChild); scrollDown(); botText('回報完成，已同步 ✅'); },350);
        markDone();
      };
    };
  }
},
{
  tool:'MSG TYPES', title:'其他訊息類型', sub:'Flex 之外的補漏',
  bot:['示範 bot','訊息類型'],
  guide:`Flex 之外還有這些。實務上 Flex 能取代大半，但<b>知道有、要時拿得出來</b>。每顆點來看 👇`,
  task:'看過 3 種訊息類型',
  recap:`<b>imagemap</b>＝一張大圖切成可點區塊；<b>template</b>（buttons/confirm）＝快速做是否、簡單選單，不用刻 Flex；<b>location</b>＝直接給地圖。要省事用 template，要漂亮可控用 Flex。`,
  setup(){
    botText('點下面看不同訊息類型 👇');
    below.innerHTML=`<div class="qr" style="flex-wrap:wrap;gap:7px;padding:11px">
      <button class="gal-tab" data-g="sticker">😄 貼圖</button>
      <button class="gal-tab" data-g="image">🖼 圖片</button>
      <button class="gal-tab" data-g="location">📍 位置</button>
      <button class="gal-tab" data-g="imagemap">🗺 imagemap</button>
      <button class="gal-tab" data-g="confirm">❔ template 確認</button>
    </div>`;
    const seen=new Set();
    const g={
      sticker:()=>addToChat(`<div class="row"><div class="av-s">🤖</div><div class="sticker-b">🎉</div></div>`),
      image:()=>addToChat(`<div class="row"><div class="av-s">🤖</div><div class="img-b">現場施工照.jpg</div></div>`),
      location:()=>addToChat(`<div class="row"><div class="av-s">🤖</div><div class="loc-b"><div class="loc-map"><span class="pin">📍</span></div><div class="loc-info"><b>全家福廚具</b>台中市南屯區萬和路二段</div></div></div>`),
      imagemap:()=>{ const n=addToChat(`<div class="row"><div class="av-s">🤖</div><div class="imgmap"><div style="background:#3b82f6" data-r="派工">派工</div><div style="background:#06c755" data-r="收款">收款</div><div style="background:#f59e0b" data-r="預約">預約</div><div style="background:#8b5cf6" data-r="說明">說明</div></div></div>`); n.querySelectorAll('[data-r]').forEach(x=>x.onclick=()=>sysNote('imagemap 點到區塊：'+x.dataset.r)); },
      confirm:()=>{ const n=addToChat(`<div class="row"><div class="av-s">🤖</div><div class="confirm-b"><div class="confirm-t">確定要把這張單標記完成嗎？</div><div class="confirm-btns"><button>取消</button><button>確定</button></div></div></div>`); n.querySelectorAll('button').forEach(b=>b.onclick=()=>sysNote('template confirm：你選了「'+b.textContent+'」')); },
    };
    below.querySelectorAll('.gal-tab').forEach(t=>t.onclick=()=>{ g[t.dataset.g](); t.classList.add('seen'); seen.add(t.dataset.g); if(seen.size>=3) markDone(); });
  }
},
{
  tool:'QUOTA', title:'reply vs push 配額經濟學', sub:'最容易燒錢的設計題',
  bot:['設計決策','配額'],
  guide:`最後一關，也最容易燒錢。同樣是「提醒大家未收款」，兩種做法成本天差地遠。<br><br><b>兩個選項都點點看</b>，看配額怎麼變 👇`,
  task:'兩種做法都試一次',
  recap:`鐵則：<b>能 reply 就別 push</b>。reply 免費、人想看才看。主動推（push / multicast / narrowcast 分眾）只留給<b>真的必要</b>的（如完工通知），且控制次數。免費方案 push 配額月僅數百則。`,
  setup(){
    let tried=0;
    botText('情境：每天要讓 46 位成員知道未收款清單。你選哪種？');
    const node=addToChat(`<div class="row"><div class="av-s">🤖</div>
      <div class="quota-box">
        <div class="qh">本月推播配額</div>
        <div class="qbar"><i id="qfill"></i></div>
        <div class="qmeta"><span>已用</span><b id="qnum">0 / 500</b></div>
        <div class="qchoice">
          <button class="qopt" id="optA">😰 排程每天 push 給 46 人</button>
          <button class="qopt" id="optB">😎 群組打指令「發 未收」→ bot reply</button>
        </div>
        <div class="qverdict" id="verd"></div>
      </div></div>`);
    const fill=$('#qfill'), num=$('#qnum'), verd=$('#verd');
    $('#optA').onclick=()=>{
      $('#optA').className='qopt picked-bad';
      let used=46*30; // 一個月
      fill.style.width='2%'; fill.style.background='#ef4444';
      num.textContent=used+' / 500';
      verd.className='qverdict bad'; verd.innerHTML='💸 46 人 × 30 天 = <b>1380 則</b>，配額 500 早就爆，超過要付費。而且很多人根本沒在看 → 燒錢又打擾。';
      bump();
    };
    $('#optB').onclick=()=>{
      $('#optB').className='qopt picked-good';
      verd.className='qverdict good'; verd.innerHTML='✅ 主管想看時打一句、bot reply 一份清單 → <b>0 配額</b>、即時、不打擾。這就是你 skill 裡的「群組指令模式」。';
      bump();
    };
    function bump(){ tried++; if(tried>=2) markDone(); }
  }
},
];

/* ════════════ 引擎 ════════════ */
function loadLevel(i){
  state.lv=i; clearPhone();
  const L=LEVELS[i];
  $('#lvN').textContent=String(i+1).padStart(2,'0');
  $('#lvTool').textContent=L.tool;
  $('#lvTitle').textContent=L.title;
  $('#lvSub').textContent=L.sub;
  $('#guideText').innerHTML=L.guide;
  $('#taskText').textContent=L.task;
  $('#botName').innerHTML = `${L.bot[0]}<small>${L.bot[1]}</small>`;
  const task=$('#task'), recap=$('#recap');
  recap.classList.remove('show'); $('#recapText').innerHTML=L.recap;
  const nb=$('#nextBtn');
  if(state.done[i]){ task.classList.add('done'); task.querySelector('.ic').textContent='✓'; recap.classList.add('show'); nb.disabled=false; nb.classList.add('pulse'); }
  else { task.classList.remove('done'); task.querySelector('.ic').textContent='◷'; nb.disabled=true; nb.classList.remove('pulse'); }
  nb.textContent = (i===TOTAL-1) ? (state.done[i]?'結業 →':'完成任務解鎖 →') : (state.done[i]?'下一關 →':'完成任務解鎖 →');
  $('#prevBtn').style.visibility = i===0 ? 'hidden':'visible';
  L.setup();
  renderRail();
}

function markDone(){
  const i=state.lv;
  if(state.done[i]) return;
  state.done[i]=true; state.xp+=XP_EACH; state.max=Math.max(state.max,i+1);
  $('#task').classList.add('done'); $('#task').querySelector('.ic').textContent='✓';
  $('#recap').classList.add('show');
  const nb=$('#nextBtn'); nb.disabled=false; nb.classList.add('pulse');
  nb.textContent = (i===TOTAL-1)?'結業 →':'下一關 →';
  floatXP();
  animXP();
  renderRail();
}

function nextLv(){ if(state.lv<TOTAL-1) loadLevel(state.lv+1); else graduate(); }
function prevLv(){ if(state.lv>0) loadLevel(state.lv-1); }

function renderRail(){
  const rail=$('#rail'); rail.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const s=document.createElement('div');
    s.className='seg'+(state.done[i]?' done':'')+(i===state.lv&&!state.done[i]?' cur':'')+(i<=state.max?' on':'');
    s.innerHTML='<i></i>';
    if(i<=state.max) s.onclick=()=>loadLevel(i);
    s.title=LEVELS[i].title;
    rail.appendChild(s);
  }
}

function animXP(){
  const box=$('#xpBox'); const target=state.xp; let cur=target-XP_EACH;
  const step=()=>{ cur+=3; if(cur>=target)cur=target; box.innerHTML=cur+' <small>/ 200 XP</small>'; if(cur<target)requestAnimationFrame(step); };
  step();
}
function floatXP(){
  const f=document.createElement('div'); f.className='floatxp'; f.textContent='+'+XP_EACH+' XP';
  const r=$('#xpBox').getBoundingClientRect();
  f.style.left=(r.left+r.width/2-22)+'px'; f.style.top=(r.top)+'px';
  document.body.appendChild(f); setTimeout(()=>f.remove(),1100);
}

function graduate(){
  const items=[
    ['Flex bubble','回報卡 · label/value 分欄'],
    ['Flex carousel','多卡左右滑'],
    ['Actions','postback / uri / 日期 / 相機'],
    ['Quick Reply','點完即消的快捷鈕'],
    ['Rich Menu','釘底部 · 多層切換'],
    ['LIFF 表單','輸入心臟 · 寫回 Ragic'],
    ['其他訊息','sticker/圖/位置/imagemap/template'],
    ['配額經濟學','reply 免費 · push 省著用'],
  ];
  $('#main').innerHTML=`
  <div class="grad">
    <div class="crown">🏆</div>
    <h2>結業</h2>
    <div class="sub">八種工具你都親手摸過一輪了 · 總計 ${state.xp} XP</div>
    <div class="grad-list">
      ${items.map(it=>`<div class="grad-item"><span class="ck">✓</span><div><b>${it[0]}</b><small>${it[1]}</small></div></div>`).join('')}
    </div>
    <div class="grad-cta">
      工具會了，但<b>工具不會自己賺錢</b>。下一步是把它們裝到一個<b>會付錢的客戶</b>身上——你最強的是 demo，真正缺的永遠是那句<b>開口收款</b>。<br>挑一個正在卡的案子，今天就把訂金開口問出來。
    </div>
    <button class="restart" onclick="restart()">↺ 重新練一次</button>
  </div>`;
  $('#xpBox').innerHTML=state.xp+' <small>/ 200 XP</small>';
}

function restart(){
  state.lv=0; state.max=0; state.xp=0; state.done=Array(TOTAL).fill(false);
  location.reload();
}

/* init */
renderRail();
loadLevel(0);
</script>
</body>
</html>
