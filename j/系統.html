<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>我的系統</title>
<style>
  :root{
    --bg:#F6F6F9;
    --surface:#FFFFFF;
    --surface-2:#FBFBFD;
    --text:#1A1A1F;
    --text-2:#6E6E78;
    --text-3:#A2A2AC;
    --hairline:#ECECF1;
    --hairline-strong:#DCDCE3;
    --accent:#5A53E0;          /* 個人系統 · 靛紫(專注) */
    --accent-press:#4942C4;
    --accent-tint:#ECEBFB;
    --todo:#9A9AA3;
    --doing:#FF9500;
    --done:#34C759;
    --field:#EFEFF4;
    --radius-card:18px;
    --radius-sheet:24px;
    --radius-field:12px;
    --shadow-card:0 1px 2px rgba(0,0,0,.04), 0 10px 30px rgba(0,0,0,.05);
    --shadow-sheet:0 -2px 50px rgba(0,0,0,.22);
    --shadow-tab:0 -.5px 0 var(--hairline);
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","PingFang TC","Microsoft JhengHei","Helvetica Neue",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.45;overscroll-behavior-y:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;font-size:16px;color:var(--text);}
  ::selection{background:var(--accent-tint);}

  .app{max-width:760px;margin:0 auto;padding:0 0 calc(72px + env(safe-area-inset-bottom));min-height:100vh;}

  /* ---------- 頂部 ---------- */
  .topbar{position:sticky;top:0;z-index:30;background:rgba(246,246,249,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(--hairline);padding:max(14px,env(safe-area-inset-top)) 20px 12px;}
  .eyebrow{font-size:13px;font-weight:600;color:var(--text-2);}
  h1.title{font-size:28px;font-weight:800;letter-spacing:-.5px;margin:3px 0 0;}
  .topbar.compact h1.title{font-size:24px;}

  /* 進度膠囊 */
  .pulse{display:flex;align-items:center;gap:14px;margin-top:14px;background:var(--surface);border-radius:16px;padding:13px 16px;box-shadow:var(--shadow-card);}
  .ring{width:46px;height:46px;flex:none;}
  .pulse-stats{display:flex;gap:18px;flex:1;}
  .pst{display:flex;flex-direction:column;}
  .pst .num{font-size:20px;font-weight:800;letter-spacing:-.5px;line-height:1.1;}
  .pst .lab{font-size:11.5px;color:var(--text-2);font-weight:600;margin-top:1px;}
  .pst .num.amber{color:var(--doing);}
  .pst .num.green{color:var(--done);}

  /* 快速新增 */
  .quickadd{display:flex;gap:9px;align-items:center;padding:14px 16px 4px;}
  .quickadd .qi{flex:1;background:var(--surface);border:1.5px solid transparent;border-radius:13px;padding:13px 14px;font-size:16px;outline:none;box-shadow:var(--shadow-card);transition:border-color .15s;}
  .quickadd .qi:focus{border-color:var(--accent);}
  .quickadd .qbtn{width:46px;height:46px;flex:none;border-radius:13px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(90,83,224,.3);transition:transform .12s,background .15s;}
  .quickadd .qbtn:active{transform:scale(.9);background:var(--accent-press);}
  .quickadd .qbtn:disabled{background:var(--hairline-strong);box-shadow:none;}

  /* ---------- 通用清單 ---------- */
  .scroll-x{display:flex;gap:8px;overflow-x:auto;padding:12px 20px 2px;scrollbar-width:none;}
  .scroll-x::-webkit-scrollbar{display:none;}
  .fchip{flex:none;display:flex;align-items:center;gap:7px;background:var(--surface);border:.5px solid var(--hairline-strong);border-radius:999px;padding:7px 13px;font-size:13.5px;font-weight:600;transition:transform .12s,background .15s,border-color .15s;}
  .fchip:active{transform:scale(.95);}
  .fchip[data-on="1"]{background:var(--text);border-color:var(--text);color:#fff;}
  .fchip .dot{width:8px;height:8px;border-radius:50%;flex:none;}
  .fchip .cnt{font-size:12px;font-weight:700;color:var(--text-3);}
  .fchip[data-on="1"] .cnt{color:rgba(255,255,255,.65);}

  .section-h{font-size:13px;font-weight:700;color:var(--text-3);padding:18px 22px 8px;display:flex;justify-content:space-between;align-items:center;}
  .section-h .toggle{color:var(--accent);font-weight:600;font-size:13px;}
  .list{padding:2px 16px 0;}

  /* 任務列 */
  .trow{display:flex;align-items:flex-start;gap:13px;background:var(--surface);border-radius:15px;box-shadow:var(--shadow-card);padding:14px 15px;margin-bottom:9px;transition:transform .14s;border:.5px solid rgba(0,0,0,.015);}
  .trow:active{transform:scale(.99);}
  .check{width:24px;height:24px;flex:none;border-radius:50%;border:2px solid var(--hairline-strong);margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .18s;background:var(--surface);}
  .check:active{transform:scale(.85);}
  .check.doing{border-color:var(--doing);}
  .check.doing::after{content:"";width:9px;height:9px;border-radius:50%;background:var(--doing);}
  .check.done{background:var(--done);border-color:var(--done);}
  .check.done svg{color:#fff;}
  .tbody{flex:1;min-width:0;cursor:pointer;}
  .ttitle{font-size:16px;font-weight:550;letter-spacing:-.1px;line-height:1.35;}
  .trow.is-done .ttitle{color:var(--text-3);text-decoration:line-through;}
  .tmeta{display:flex;align-items:center;flex-wrap:wrap;gap:7px;margin-top:7px;}
  .ptag{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text-2);background:var(--field);padding:3px 9px;border-radius:999px;}
  .ptag .pd{width:7px;height:7px;border-radius:50%;flex:none;}
  .duechip{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--field);color:var(--text-2);}
  .duechip.over{background:#FFEBE9;color:#E0483B;}
  .duechip.today{background:#FFF2E0;color:#C77800;}
  .flag-hi{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none;}

  /* 專案卡 */
  .pcard{background:var(--surface);border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:16px;margin-bottom:11px;transition:transform .14s;}
  .pcard:active{transform:scale(.985);}
  .pcard-top{display:flex;align-items:center;gap:10px;}
  .pcard-dot{width:12px;height:12px;border-radius:4px;flex:none;}
  .pcard-name{font-size:17px;font-weight:700;letter-spacing:-.2px;flex:1;}
  .pcard-cnt{font-size:13px;color:var(--text-3);font-weight:600;}
  .pcard-next{font-size:14px;color:var(--text-2);margin-top:9px;line-height:1.5;}
  .pcard-next .k{color:var(--accent);font-weight:700;font-size:12px;}
  .pbar{height:6px;border-radius:3px;background:var(--field);margin-top:12px;overflow:hidden;}
  .pbar > i{display:block;height:100%;border-radius:3px;transition:width .4s cubic-bezier(.2,.8,.2,1);}

  /* 日誌 */
  .jcard{background:var(--surface);border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:16px;margin-bottom:11px;transition:transform .14s;}
  .jcard:active{transform:scale(.985);}
  .jhead{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .jdate{font-size:12px;font-weight:700;color:var(--text-3);}
  .jsit{font-size:16px;font-weight:650;letter-spacing:-.2px;line-height:1.35;}
  .jrow{display:flex;gap:9px;margin-top:9px;font-size:14.5px;line-height:1.5;}
  .jrow .tagk{flex:none;font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;height:fit-content;margin-top:2px;letter-spacing:.3px;}
  .jrow.dec .tagk{background:var(--accent-tint);color:var(--accent);}
  .jrow.out .tagk{background:#E7F8EC;color:#1F9D4E;}
  .jrow .txt{color:var(--text);white-space:pre-wrap;}

  /* KPI */
  .kgrid{padding:6px 16px 0;}
  .kcard{background:var(--surface);border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:16px;margin-bottom:11px;display:flex;align-items:center;gap:16px;}
  .kring{width:62px;height:62px;flex:none;}
  .kmid{flex:1;min-width:0;}
  .kname{font-size:16px;font-weight:700;letter-spacing:-.2px;}
  .kval{font-size:13px;color:var(--text-2);font-weight:600;margin-top:3px;}
  .kval b{color:var(--text);font-size:15px;}
  .kper{font-size:11px;color:var(--text-3);font-weight:600;margin-top:2px;}
  .kbtns{display:flex;flex-direction:column;gap:6px;flex:none;}
  .kbtns .step{width:36px;height:32px;border-radius:9px;background:var(--field);font-size:18px;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:center;transition:transform .12s;}
  .kbtns .step:active{transform:scale(.9);}

  /* 空狀態 */
  .empty{text-align:center;padding:64px 30px;}
  .empty .ico{width:64px;height:64px;border-radius:20px;background:var(--surface);box-shadow:var(--shadow-card);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--accent);}
  .empty h2{font-size:18px;font-weight:700;margin:0 0 6px;}
  .empty p{color:var(--text-2);font-size:14.5px;margin:0 auto 20px;max-width:290px;}
  .empty .cta{background:var(--accent);color:#fff;font-size:15px;font-weight:600;padding:11px 24px;border-radius:13px;display:inline-block;}
  .empty .cta:active{background:var(--accent-press);}

  .addbar{padding:6px 16px 0;}
  .addbar button{width:100%;background:var(--surface);border:1.5px dashed var(--hairline-strong);border-radius:14px;padding:14px;font-size:15px;font-weight:600;color:var(--accent);transition:transform .12s,background .15s;}
  .addbar button:active{transform:scale(.99);background:var(--surface-2);}

  /* ---------- 底部分頁 ---------- */
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:45;max-width:760px;margin:0 auto;background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);box-shadow:var(--shadow-tab);display:flex;padding:6px 6px env(safe-area-inset-bottom);}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px 6px;color:var(--text-3);transition:color .15s;}
  .tab svg{width:25px;height:25px;}
  .tab span{font-size:10.5px;font-weight:600;}
  .tab[data-on="1"]{color:var(--accent);}

  /* ---------- Sheet ---------- */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50;opacity:0;pointer-events:none;transition:opacity .3s;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:60;max-width:760px;margin:0 auto;background:var(--surface);border-radius:var(--radius-sheet) var(--radius-sheet) 0 0;box-shadow:var(--shadow-sheet);max-height:93vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .34s cubic-bezier(.32,.72,0,1);padding-bottom:env(safe-area-inset-bottom);}
  .sheet.show{transform:translateY(0);}
  .grip{width:38px;height:5px;border-radius:3px;background:var(--hairline-strong);margin:9px auto 0;flex:none;}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 12px;border-bottom:.5px solid var(--hairline);flex:none;}
  .sheet-head h3{font-size:17px;font-weight:700;margin:0;}
  .sheet-head .lbtn{font-size:16px;color:var(--accent);font-weight:500;padding:6px 2px;min-width:48px;text-align:left;}
  .sheet-head .rbtn{font-size:16px;color:var(--accent);font-weight:700;padding:6px 2px;min-width:48px;text-align:right;}
  .sheet-head .rbtn:disabled{color:var(--text-3);font-weight:500;}
  .sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 18px 26px;}

  .field-group{margin-top:18px;}
  .flabel{font-size:13px;font-weight:600;color:var(--text-2);margin:0 0 7px 3px;}
  .flabel .req{color:var(--accent);}
  .flabel .opt{color:var(--text-3);font-weight:500;}
  .finput,.ftext{width:100%;background:var(--field);border:1.5px solid transparent;border-radius:var(--radius-field);padding:12px 13px;font-size:16px;outline:none;transition:border-color .15s,background .15s;}
  .finput:focus,.ftext:focus{background:var(--surface);border-color:var(--accent);}
  .ftext{resize:vertical;min-height:80px;line-height:1.5;}
  .seg{display:flex;background:var(--field);border-radius:11px;padding:3px;gap:3px;}
  .seg button{flex:1;padding:9px 4px;font-size:14px;font-weight:600;color:var(--text-2);border-radius:8px;transition:all .18s;white-space:nowrap;}
  .seg button[data-on="1"]{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1);}
  .chiprow{display:flex;flex-wrap:wrap;gap:8px;}
  .chiprow button{padding:9px 14px;font-size:14px;font-weight:600;border-radius:999px;background:var(--field);color:var(--text-2);border:1.5px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px;}
  .chiprow button .pd{width:8px;height:8px;border-radius:50%;}
  .chiprow button[data-on="1"]{background:var(--accent-tint);color:var(--accent);border-color:rgba(90,83,224,.25);}
  .colorrow{display:flex;flex-wrap:wrap;gap:11px;padding:2px;}
  .colorrow button{width:34px;height:34px;border-radius:50%;border:2.5px solid transparent;transition:transform .12s;}
  .colorrow button[data-on="1"]{transform:scale(1.12);box-shadow:0 0 0 2.5px var(--surface),0 0 0 4.5px currentColor;}
  .colorrow button:active{transform:scale(.92);}

  .d-actions{display:flex;gap:10px;margin-top:26px;}
  .d-actions .delb{flex:1;color:#E0483B;font-weight:600;font-size:15px;padding:13px;border-radius:13px;background:#FFEBE9;transition:transform .12s;}
  .d-actions .delb:active{transform:scale(.97);}

  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 86px);transform:translateX(-50%) translateY(20px);background:rgba(26,26,31,.94);color:#fff;font-size:14px;font-weight:600;padding:11px 20px;border-radius:999px;z-index:90;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;backdrop-filter:blur(10px);display:flex;align-items:center;gap:8px;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar" id="topbar"></header>
  <div id="content"></div>
</div>

<nav class="tabbar" id="tabbar"></nav>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="grip"></div>
  <div class="sheet-head" id="sheetHead"></div>
  <div class="sheet-body" id="sheetBody"></div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ============ 設定 ============ */
  const STORE_KEY='jky-personal-v1';
  const PRIORITY={high:'重要',mid:'一般',low:'之後'};
  const TSTATUS={todo:'待辦',doing:'進行中',done:'完成'};
  const PALETTE=['#5A53E0','#E0483B','#0A84FF','#FF9500','#18A999','#34C759','#AF52DE','#FF2D78','#8E8E93','#5856D6'];
  const TABS=[
    {k:'today', label:'今天', icon:'M3 12h4l2-7 4 14 2-7h4'},
    {k:'projects', label:'專案', icon:'M3 5h7v6H3zM14 5h7v6h-7zM3 14h7v5H3zM14 14h7v5h-7z'},
    {k:'journal', label:'日誌', icon:'M5 4h11l3 3v13H5zM9 9h7M9 13h7M9 17h4'},
    {k:'kpi', label:'指標', icon:'M4 19V5M9 19v-7M14 19V9M19 19V3'},
  ];

  /* ============ 狀態 ============ */
  let S={tab:'today', tasks:[], projects:[], journal:[], kpis:[], showDone:false, openProject:null};
  let mem={tasks:[],projects:[],journal:[],kpis:[]};
  const storageOK=(typeof window.storage!=='undefined' && window.storage);

  /* ============ 儲存 ============ */
  async function load(){
    if(!storageOK){ Object.assign(S,mem); return; }
    try{
      const r=await window.storage.get(STORE_KEY);
      const d=r&&r.value?JSON.parse(r.value):null;
      if(d){ S.tasks=d.tasks||[]; S.projects=d.projects||[]; S.journal=d.journal||[]; S.kpis=d.kpis||[]; }
    }catch(e){}
  }
  async function save(){
    const d={tasks:S.tasks,projects:S.projects,journal:S.journal,kpis:S.kpis};
    if(!storageOK){ mem=d; return; }
    try{ await window.storage.set(STORE_KEY,JSON.stringify(d)); }
    catch(e){ toast('儲存失敗'); }
  }
  function seedIfEmpty(){
    if(S.projects.length===0){
      const seed=[['J·KEY',0],['BNI',1],['學校',2],['FAMI',3],['個人',4]];
      S.projects=seed.map(([n,c])=>({id:uid(),name:n,color:PALETTE[c],nextStep:'',archived:false,createdAt:now()}));
    }
    if(S.kpis.length===0){
      S.kpis=[{id:uid(),name:'本月跑量',unit:'km',current:0,target:100,period:'monthly',month:ym(),createdAt:now()}];
    }
  }
  function refreshMonthly(){
    let changed=false;
    S.kpis.forEach(k=>{ if(k.period==='monthly' && k.month!==ym()){ k.current=0; k.month=ym(); changed=true; } });
    if(changed) save();
  }

  /* ============ 工具 ============ */
  const $=s=>document.querySelector(s);
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
  function now(){return new Date().toISOString();}
  function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  function ym(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
  function fmt(iso){if(!iso)return'';const p=iso.split('-');return p.length===3?`${p[0]}/${p[1]}/${p[2]}`:iso;}
  function projById(id){return S.projects.find(p=>p.id===id);}
  function dayDiff(iso){if(!iso)return null;const a=new Date(todayISO()+'T00:00:00');const b=new Date(iso+'T00:00:00');return Math.round((b-a)/86400000);}
  function dueChip(iso){
    const d=dayDiff(iso); if(d===null) return '';
    if(d<0) return `<span class="duechip over">逾期 ${-d} 天</span>`;
    if(d===0) return `<span class="duechip today">今天</span>`;
    if(d===1) return `<span class="duechip">明天</span>`;
    if(d<=6) return `<span class="duechip">${d} 天後</span>`;
    return `<span class="duechip">${fmt(iso).slice(5)}</span>`;
  }
  function greeting(){const h=new Date().getHours();return h<5?'夜深了':h<11?'早安':h<14?'午安':h<18?'下午好':'晚安';}
  function ringSVG(pct,color,size,sw){
    size=size||46; sw=sw||5; const r=(size-sw)/2; const c=2*Math.PI*r; const off=c*(1-Math.max(0,Math.min(1,pct)));
    return `<svg class="ring" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--field)" stroke-width="${sw}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"
        stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${size/2} ${size/2})"/>
    </svg>`;
  }

  let toastT;
  function toast(m){const t=$('#toast');t.innerHTML=esc(m);t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1800);}

  /* ============ 頂部 + 分頁 ============ */
  function renderTopbar(){
    const tb=$('#topbar');
    if(S.tab==='today'){
      const active=S.tasks.filter(t=>t.status!=='done');
      const doing=active.filter(t=>t.status==='doing').length;
      const doneToday=S.tasks.filter(t=>t.status==='done'&&(t.completedAt||'').slice(0,10)===todayISO()).length;
      const plate=active.filter(t=>{const d=dayDiff(t.due);return d===null||d<=0||t.priority==='high';}).length;
      const pct=(doneToday+plate)===0?1:doneToday/(doneToday+plate);
      tb.className='topbar';
      tb.innerHTML=`<div class="eyebrow">${greeting()}．${fmt(todayISO())}</div><h1 class="title">今天</h1>
        <div class="pulse">
          ${ringSVG(pct,'var(--accent)')}
          <div class="pulse-stats">
            <div class="pst"><span class="num">${active.length}</span><span class="lab">待辦</span></div>
            <div class="pst"><span class="num amber">${doing}</span><span class="lab">進行中</span></div>
            <div class="pst"><span class="num green">${doneToday}</span><span class="lab">今日完成</span></div>
          </div>
        </div>`;
    }else if(S.tab==='projects'){
      tb.className='topbar';
      tb.innerHTML=`<div class="eyebrow">分領域追蹤</div><h1 class="title">專案</h1>`;
    }else if(S.tab==='journal'){
      tb.className='topbar';
      tb.innerHTML=`<div class="eyebrow">遇到什麼 · 怎麼決定 · 結果</div><h1 class="title">決策日誌</h1>`;
    }else{
      tb.className='topbar';
      tb.innerHTML=`<div class="eyebrow">你的關鍵數字</div><h1 class="title">指標</h1>`;

  function renderTabbar(){
    $('#tabbar').innerHTML=TABS.map(t=>`
      <button class="tab" data-tab="${t.k}" data-on="${S.tab===t.k?1:0}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${t.icon}"/></svg>
        <span>${t.label}</span>
      </button>`).join('');
  }

  /* ============ 今天 ============ */
  function renderToday(){
    const c=$('#content');
    const active=S.tasks.filter(t=>t.status!=='done');
    const done=S.tasks.filter(t=>t.status==='done').sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
    const pw={high:0,mid:1,low:2};
    active.sort((a,b)=>{
      const p=(pw[a.priority]??1)-(pw[b.priority]??1); if(p)return p;
      const da=dayDiff(a.due),db=dayDiff(b.due);
      const va=da===null?9999:da, vb=db===null?9999:db; if(va!==vb)return va-vb;
      return (b.updatedAt||'').localeCompare(a.updatedAt||'');
    });
    let html=`<div class="quickadd">
      <input class="qi" id="qadd" placeholder="加一件要做的事，按 Enter…" autocomplete="off">
      <button class="qbtn" id="qbtn" disabled aria-label="新增"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg></button>
    </div>`;

    if(active.length===0 && done.length===0){
      html+=`<div class="empty"><div class="ico"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
        <h2>今天還很乾淨</h2><p>把腦子裡那些「等等要做」的事丟上來，一件一行就好。</p></div>`;
      c.innerHTML=html; bindQuickAdd(); return;
    }
    html+=`<div class="section-h">要做的事 <span style="color:var(--text-3);font-weight:600">${active.length}</span></div><div class="list" id="activeList">`;
    html+=active.map(taskRow).join('') || `<div style="padding:14px 22px;color:var(--text-3);font-size:14px">全部清完了 🎉</div>`;
    html+=`</div>`;
    if(done.length){
      html+=`<div class="section-h">已完成 <span class="toggle" id="toggleDone">${S.showDone?'收合':'展開 '+done.length}</span></div>`;
      if(S.showDone){ html+=`<div class="list">`+done.slice(0,40).map(taskRow).join('')+`</div>`; }
    }
    c.innerHTML=html;
    bindQuickAdd();
    bindTaskRows();
    const td=$('#toggleDone'); if(td) td.onclick=()=>{S.showDone=!S.showDone;renderToday();};
  }
  function taskRow(t){
    const p=projById(t.project);
    const cls=t.status==='done'?'done':(t.status==='doing'?'doing':'');
    return `<div class="trow ${t.status==='done'?'is-done':''}" data-id="${t.id}">
      <div class="check ${cls}" data-check="${t.id}">${t.status==='done'?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M20 6 9 17l-5-5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>
      <div class="tbody" data-open="${t.id}">
        <div class="ttitle">${esc(t.title)}</div>
        <div class="tmeta">
          ${t.priority==='high'&&t.status!=='done'?'<span class="flag-hi"></span>':''}
          ${p?`<span class="ptag"><span class="pd" style="background:${p.color}"></span>${esc(p.name)}</span>`:''}
          ${t.status!=='done'?dueChip(t.due):''}
        </div>
      </div>
    </div>`;
  }
  function bindQuickAdd(){
    const qi=$('#qadd'),qb=$('#qbtn'); if(!qi)return;
    const v=()=>qb.disabled=!qi.value.trim();
    qi.oninput=v;
    qi.onkeydown=e=>{if(e.key==='Enter'&&qi.value.trim())add();};
    qb.onclick=add;
    async function add(){
      const title=qi.value.trim(); if(!title)return;
      S.tasks.push({id:uid(),title,project:null,priority:'mid',status:'todo',due:'',notes:'',createdAt:now(),updatedAt:now(),completedAt:null});
      await save(); qi.value=''; v(); renderTopbar(); renderToday(); qi.focus();
    }
  }
  function bindTaskRows(){
    document.querySelectorAll('[data-check]').forEach(el=>{
      el.onclick=async ev=>{ev.stopPropagation();const id=el.dataset.check;const t=S.tasks.find(x=>x.id===id);
        if(t.status==='done'){t.status='todo';t.completedAt=null;}else{t.status='done';t.completedAt=now();}
        t.updatedAt=now();await save();renderTopbar();renderActiveContext();};
    });
    document.querySelectorAll('[data-open]').forEach(el=>{ el.onclick=()=>openTaskForm(S.tasks.find(x=>x.id===el.dataset.open)); });
  }
  function renderActiveContext(){ if(S.tab==='today')renderToday(); else if(S.tab==='projects'&&S.openProject)renderProjectDetail(S.openProject); }

  /* ============ 專案 ============ */
  function renderProjects(){
    const c=$('#content');
    const ps=S.projects.filter(p=>!p.archived);
    if(ps.length===0){
      c.innerHTML=`<div class="empty"><div class="ico"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="7" height="7" rx="1.5"/><rect x="14" y="4" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="6" rx="1.5"/></svg></div><h2>還沒有專案</h2><p>把你正在推的事情各開一格：客戶案、學校、兵役…</p></div>
        <div class="addbar"><button id="addProj">＋ 新增專案</button></div>`;
      $('#addProj').onclick=()=>openProjectForm(); return;
    }
    let html=`<div style="height:8px"></div><div class="list">`;
    html+=ps.map(p=>{
      const ts=S.tasks.filter(t=>t.project===p.id);
      const dn=ts.filter(t=>t.status==='done').length;
      const pct=ts.length?dn/ts.length:0;
      return `<div class="pcard" data-proj="${p.id}">
        <div class="pcard-top"><span class="pcard-dot" style="background:${p.color}"></span><span class="pcard-name">${esc(p.name)}</span><span class="pcard-cnt">${dn}/${ts.length}</span></div>
        ${p.nextStep?`<div class="pcard-next"><span class="k">下一步 </span>${esc(p.nextStep)}</div>`:'<div class="pcard-next" style="color:var(--text-3)">點進去設定下一步</div>'}
        <div class="pbar"><i style="width:${(pct*100).toFixed(0)}%;background:${p.color}"></i></div>
      </div>`;
    }).join('');
    html+=`</div><div class="addbar"><button id="addProj">＋ 新增專案</button></div>`;
    c.innerHTML=html;
    document.querySelectorAll('[data-proj]').forEach(el=>el.onclick=()=>renderProjectDetail(el.dataset.proj));
    $('#addProj').onclick=()=>openProjectForm();
  }
  function renderProjectDetail(pid){
    S.openProject=pid;
    const p=projById(pid); if(!p){S.openProject=null;renderProjects();return;}
    const ts=S.tasks.filter(t=>t.project===pid);
    const active=ts.filter(t=>t.status!=='done');
    const done=ts.filter(t=>t.status==='done');
    const pct=ts.length?done.length/ts.length:0;
    renderTopbar();
    const c=$('#content');
    let html=`<div style="padding:14px 20px 0;"><button id="backProj" style="color:var(--accent);font-size:15px;font-weight:600;display:flex;align-items:center;gap:4px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>專案</button></div>`;
    html+=`<div style="padding:10px 22px 0;"><div style="display:flex;align-items:center;gap:10px;"><span class="pcard-dot" style="background:${p.color};width:14px;height:14px"></span><h1 style="font-size:25px;font-weight:800;letter-spacing:-.5px;margin:0;flex:1">${esc(p.name)}</h1>
      <button id="editProj" style="color:var(--accent);font-size:15px;font-weight:600">編輯</button></div>
      <div class="pbar" style="margin-top:14px"><i style="width:${(pct*100).toFixed(0)}%;background:${p.color}"></i></div>
      <div style="font-size:12.5px;color:var(--text-3);font-weight:600;margin-top:7px">${done.length}/${ts.length} 完成</div>
      ${p.nextStep?`<div style="margin-top:14px;background:var(--accent-tint);border-radius:13px;padding:13px 15px;font-size:14.5px;line-height:1.5"><span style="color:var(--accent);font-weight:700;font-size:12px">下一步　</span>${esc(p.nextStep)}</div>`:''}
    </div>`;
    html+=`<div class="quickadd" style="padding-top:16px"><input class="qi" id="qaddP" placeholder="加一件這個專案的任務…" autocomplete="off"><button class="qbtn" id="qbtnP" disabled><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg></button></div>`;
    if(active.length){html+=`<div class="section-h">進行中 <span style="color:var(--text-3);font-weight:600">${active.length}</span></div><div class="list">`+active.sort((a,b)=>({high:0,mid:1,low:2}[a.priority]-{high:0,mid:1,low:2}[b.priority])).map(taskRow).join('')+`</div>`;}
    else if(done.length){html+=`<div style="padding:18px 22px;color:var(--text-3);font-size:14px">這個專案的任務都完成了 🎉</div>`;}
    else{html+=`<div style="padding:18px 22px;color:var(--text-3);font-size:14px">還沒有任務，從上面加第一件。</div>`;}
    if(done.length){html+=`<div class="section-h">已完成 ${done.length}</div><div class="list">`+done.map(taskRow).join('')+`</div>`;}
    c.innerHTML=html;
    $('#backProj').onclick=()=>{S.openProject=null;renderTopbar();renderProjects();};
    $('#editProj').onclick=()=>openProjectForm(p);
    bindTaskRows();
    const qi=$('#qaddP'),qb=$('#qbtnP');
    const v=()=>qb.disabled=!qi.value.trim(); qi.oninput=v;
    qi.onkeydown=e=>{if(e.key==='Enter'&&qi.value.trim())addP();};
    qb.onclick=addP;
    async function addP(){const title=qi.value.trim();if(!title)return;
      S.tasks.push({id:uid(),title,project:pid,priority:'mid',status:'todo',due:'',notes:'',createdAt:now(),updatedAt:now(),completedAt:null});
      await save();qi.value='';v();renderProjectDetail(pid);$('#qaddP').focus();}
  }

  /* ============ 日誌 ============ */

      c.innerHTML=`<div class="empty"><div class="ico"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h11l3 3v13H5z"/><path d="M9 10h7M9 14h5"/></svg></div><h2>還沒有紀錄</h2><p>遇到要做決定的事，記一筆：當下狀況、你怎麼決定的、後來結果。下次就不用重想。</p></div>

        <div class="jhead"><span class="jdate">${fmt(j.date)}</span>${p?`<span class="ptag"><span class="pd" style="background:${p.color}"></span>${esc(p.name)}</span>`:''}</div>
        <div class="jsit">${esc(j.situation)}</div>
        ${j.decision?`<div class="jrow dec"><span class="tagk">決定</span><span class="txt">${esc(j.decision)}</span></div>`:''}

  }

  /* ============ 指標 ============ */
  function renderKpi(){
    const c=$('#content');
    if(S.kpis.length===0){
      c.innerHTML=`<div class="empty"><div class="ico"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19V5M9 19v-7M14 19V9M19 19V3"/></svg></div><h2>還沒有指標</h2><p>挑幾個你真的在追的數字：本月跑量、連續讀經、引薦數…點一下就能更新。</p></div>
        <div class="addbar"><button id="addK">＋ 新增指標</button></div>`;
      $('#addK').onclick=()=>openKpiForm(); return;
    }
    let html=`<div style="height:8px"></div><div class="kgrid">`;
    html+=S.kpis.map(k=>{
      const pct=k.target>0?k.current/k.target:0;
      const col=pct>=1?'var(--done)':'var(--accent)';
      return `<div class="kcard" data-k="${k.id}">
        <div style="position:relative;width:62px;height:62px;flex:none">
          ${ringSVG(pct,col,62,6)}
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:${col}">${Math.round(pct*100)}%</div>
        </div>
        <div class="kmid" data-kopen="${k.id}">
          <div class="kname">${esc(k.name)}</div>
          <div class="kval"><b>${fmtNum(k.current)}</b> / ${fmtNum(k.target)} ${esc(k.unit||'')}</div>
          <div class="kper">${k.period==='monthly'?'每月歸零 · '+(k.month||ym()):'累計'}</div>
        </div>
        <div class="kbtns">
          <button class="step" data-kinc="${k.id}">＋</button>
          <button class="step" data-kdec="${k.id}">－</button>
        </div>
      </div>`;
    }).join('');
    html+=`</div><div class="addbar"><button id="addK">＋ 新增指標</button></div>`;
    c.innerHTML=html;
    document.querySelectorAll('[data-kinc]').forEach(el=>el.onclick=()=>stepKpi(el.dataset.kinc,1));
    document.querySelectorAll('[data-kdec]').forEach(el=>el.onclick=()=>stepKpi(el.dataset.kdec,-1));
    document.querySelectorAll('[data-kopen]').forEach(el=>el.onclick=()=>openKpiForm(S.kpis.find(x=>x.id===el.dataset.kopen)));
    $('#addK').onclick=()=>openKpiForm();
  }
  function fmtNum(n){return Number.isInteger(n)?n:(Math.round(n*10)/10);}
  async function stepKpi(id,dir){
    const k=S.kpis.find(x=>x.id===id); if(!k)return;
    const step=k.target>=50?1:(k.target>=10?1:0.5);
    k.current=Math.max(0,Math.round((k.current+dir*step)*10)/10);
    await save(); renderKpi();
  }

  /* ============ Sheet 控制 ============ */
  function openSheet(){$('#scrim').classList.add('show');$('#sheet').classList.add('show');document.body.style.overflow='hidden';}
  function closeSheet(){$('#scrim').classList.remove('show');$('#sheet').classList.remove('show');document.body.style.overflow='';}

  /* ---- 任務表單 ---- */
  function openTaskForm(existing){
    const ed=!!existing;
    const d=ed?JSON.parse(JSON.stringify(existing)):{title:'',project:S.openProject||null,priority:'mid',status:'todo',due:'',notes:''};
    $('#sheetHead').innerHTML=`<button class="lbtn" id="cf">取消</button><h3>${ed?'任務':'新增任務'}</h3><button class="rbtn" id="sf" disabled>${ed?'儲存':'新增'}</button>`;
    const pchips=S.projects.filter(p=>!p.archived).map(p=>`<button data-pj="${p.id}" data-on="${d.project===p.id?1:0}"><span class="pd" style="background:${p.color}"></span>${esc(p.name)}</button>`).join('');
    $('#sheetBody').innerHTML=`
      <div class="field-group"><div class="flabel">要做什麼 <span class="req">必填</span></div><input class="finput" id="t_title" placeholder="一句話寫清楚" value="${esc(d.title)}"></div>
      ${ed?`<div class="field-group"><div class="flabel">狀態</div><div class="seg" id="t_st">${Object.entries(TSTATUS).map(([k,v])=>`<button data-st="${k}" data-on="${d.status===k?1:0}">${v}</button>`).join('')}</div></div>`:''}
      <div class="field-group"><div class="flabel">專案 <span class="opt">選填</span></div><div class="chiprow" id="t_pj"><button data-pj="" data-on="${!d.project?1:0}">無</button>${pchips}</div></div>

      <div class="field-group"><div class="flabel">期限 <span class="opt">選填</span></div><input class="finput" id="t_due" type="date" value="${esc(d.due||'')}"></div>
      <div class="field-group"><div class="flabel">備註 <span class="opt">選填</span></div><textarea class="ftext" id="t_notes" placeholder="細節、連結、待確認…">${esc(d.notes||'')}</textarea></div>

    openSheet();
    const ti=$('#t_title'),sf=$('#sf');
    const v=()=>sf.disabled=!ti.value.trim(); ti.oninput=v; v();

    $('#t_pri').onclick=e=>{const b=e.target.closest('button');if(!b)return;d.priority=b.dataset.pri;$('#t_pri').querySelectorAll('button').forEach(x=>x.dataset.on=(x===b?1:0));};
    const stEl=$('#t_st'); if(stEl)stEl.onclick=e=>{const b=e.target.closest('button');if(!b)return;d.status=b.dataset.st;stEl.querySelectorAll('button').forEach(x=>x.dataset.on=(x===b?1:0));};
    $('#cf').onclick=closeSheet;
    sf.onclick=async()=>{
      const payload={title:ti.value.trim(),project:d.project,priority:d.priority,due:$('#t_due').value||'',notes:$('#t_notes').value.trim()};
      if(ed){const i=S.tasks.findIndex(x=>x.id===existing.id);const wasDone=S.tasks[i].status==='done';const nowDone=d.status==='done';
        S.tasks[i]={...S.tasks[i],...payload,status:d.status,updatedAt:now(),completedAt:nowDone?(wasDone?S.tasks[i].completedAt:now()):null};
      }else{S.tasks.push({id:uid(),...payload,status:'todo',createdAt:now(),updatedAt:now(),completedAt:null});}
      await save();closeSheet();renderTopbar();routeRender();toast(ed?'已儲存':'已加入');
    };
    const del=$('#t_del'); if(del)del.onclick=async()=>{if(!confirm('刪除這個任務？'))return;S.tasks=S.tasks.filter(x=>x.id!==existing.id);await save();closeSheet();renderTopbar();routeRender();toast('已刪除');};
  }

  function openProjectForm(existing){

    $('#sheetHead').innerHTML=`<button class="lbtn" id="cf">取消</button><h3>${ed?'編輯專案':'新增專案'}</h3><button class="rbtn" id="sf" disabled>${ed?'儲存':'建立'}</button>`;

      ${ed?`<div class="d-actions"><button class="delb" id="p_del">刪除專案</button></div>`:''}`;
    openSheet();
    const ni=$('#p_name'),sf=$('#sf');
    const v=()=>sf.disabled=!ni.value.trim();ni.oninput=v;v();
    setTimeout(()=>{if(!ed)ni.focus();},350);
    $('#p_col').onclick=e=>{const b=e.target.closest('button');if(!b)return;d.color=b.dataset.c;$('#p_col').querySelectorAll('button').forEach(x=>x.dataset.on=(x===b?1:0));};
    $('#cf').onclick=closeSheet;
    sf.onclick=async()=>{
      const payload={name:ni.value.trim(),color:d.color,nextStep:$('#p_next').value.trim()};
      if(ed){const i=S.projects.findIndex(x=>x.id===existing.id);S.projects[i]={...S.projects[i],...payload};}
      else{S.projects.push({id:uid(),...payload,archived:false,createdAt:now()});}
      await save();closeSheet();
      if(ed&&S.openProject)renderProjectDetail(existing.id);else{S.openProject=null;renderTopbar();renderProjects();}
      toast(ed?'已儲存':'專案已建立');
    };
    const del=$('#p_del'); if(del)del.onclick=async()=>{
      const has=S.tasks.filter(t=>t.project===existing.id).length;
      if(!confirm(has?`這個專案有 ${has} 個任務，刪除後任務會保留但變成「無專案」。確定刪除？`:'刪除這個專案？'))return;
      S.tasks.forEach(t=>{if(t.project===existing.id)t.project=null;});
      S.projects=S.projects.filter(x=>x.id!==existing.id);
      await save();closeSheet();S.openProject=null;renderTopbar();renderProjects();toast('已刪除');
    };
  }

  /* ---- 日誌表單 ---- */
  function openJournalForm(existing){
    const ed=!!existing;
    const d=ed?JSON.parse(JSON.stringify(existing)):{situation:'',decision:'',outcome:'',project:null,date:todayISO()};
    $('#sheetHead').innerHTML=`<button class="lbtn" id="cf">取消</button><h3>${ed?'紀錄':'新增紀錄'}</h3><button class="rbtn" id="sf" disabled>${ed?'儲存':'新增'}</button>`;
    const pchips=S.projects.filter(p=>!p.archived).map(p=>`<button data-pj="${p.id}" data-on="${d.project===p.id?1:0}"><span class="pd" style="background:${p.color}"></span>${esc(p.name)}</button>`).join('');
    $('#sheetBody').innerHTML=`
      <div class="field-group"><div class="flabel">遇到什麼狀況 <span class="req">必填</span></div><input class="finput" id="j_sit" placeholder="一句話描述當下的問題/抉擇" value="${esc(d.situation)}"></div>
      <div class="field-group"><div class="flabel">我怎麼決定 <span class="opt">選填</span></div><textarea class="ftext" id="j_dec" placeholder="做了什麼決定、為什麼">${esc(d.decision)}</textarea></div>
      <div class="field-group"><div class="flabel">結果 <span class="opt">選填，之後回來補</span></div><textarea class="ftext" id="j_out" placeholder="後來怎麼了、學到什麼" style="min-height:60px">${esc(d.outcome)}</textarea></div>
      <div class="field-group"><div class="flabel">相關專案 <span class="opt">選填</span></div><div class="chiprow" id="j_pj"><button data-pj="" data-on="${!d.project?1:0}">無</button>${pchips}</div></div>
      <div class="field-group"><div class="flabel">日期</div><input class="finput" id="j_date" type="date" value="${esc(d.date)}"></div>
      ${ed?`<div class="d-actions"><button class="delb" id="j_del">刪除紀錄</button></div>`:''}`;
    openSheet();
    const si=$('#j_sit'),sf=$('#sf');
    const v=()=>sf.disabled=!si.value.trim();si.oninput=v;v();
    setTimeout(()=>{if(!ed)si.focus();},350);
    $('#j_pj').onclick=e=>{const b=e.target.closest('button');if(!b)return;d.project=b.dataset.pj||null;$('#j_pj').querySelectorAll('button').forEach(x=>x.dataset.on=(x===b?1:0));};
    $('#cf').onclick=closeSheet;
    sf.onclick=async()=>{
      const payload={situation:si.value.trim(),decision:$('#j_dec').value.trim(),outcome:$('#j_out').value.trim(),project:d.project,date:$('#j_date').value||todayISO()};
      if(ed){const i=S.journal.findIndex(x=>x.id===existing.id);S.journal[i]={...S.journal[i],...payload};}
      else{S.journal.push({id:uid(),...payload,createdAt:now()});}
      await save();closeSheet();renderJournal();toast(ed?'已儲存':'已記下');
    };
    const del=$('#j_del'); if(del)del.onclick=async()=>{if(!confirm('刪除這筆紀錄？'))return;S.journal=S.journal.filter(x=>x.id!==existing.id);await save();closeSheet();renderJournal();toast('已刪除');};
  }

  /* ---- KPI 表單 ---- */
  function openKpiForm(existing){
    const ed=!!existing;
    const d=ed?JSON.parse(JSON.stringify(existing)):{name:'',unit:'',current:0,target:10,period:'monthly',month:ym()};
    $('#sheetHead').innerHTML=`<button class="lbtn" id="cf">取消</button><h3>${ed?'指標':'新增指標'}</h3><button class="rbtn" id="sf" disabled>${ed?'儲存':'新增'}</button>`;
    $('#sheetBody').innerHTML=`
      <div class="field-group"><div class="flabel">指標名稱 <span class="req">必填</span></div><input class="finput" id="k_name" placeholder="例如：本月跑量、連續讀經天數" value="${esc(d.name)}"></div>
      <div class="field-group"><div class="flabel">目前 / 目標</div><div style="display:flex;gap:10px"><input class="finput" id="k_cur" type="number" inputmode="decimal" placeholder="目前" value="${d.current}"><input class="finput" id="k_tar" type="number" inputmode="decimal" placeholder="目標" value="${d.target}"></div></div>
      <div class="field-group"><div class="flabel">單位 <span class="opt">選填</span></div><input class="finput" id="k_unit" placeholder="km / 天 / 件…" value="${esc(d.unit||'')}"></div>
      <div class="field-group"><div class="flabel">週期</div><div class="seg" id="k_per"><button data-p="monthly" data-on="${d.period==='monthly'?1:0}">每月歸零</button><button data-p="cumulative" data-on="${d.period==='cumulative'?1:0}">累計</button></div></div>
      ${ed?`<div class="d-actions"><button class="delb" id="k_del">刪除指標</button></div>`:''}`;
    openSheet();
    const ni=$('#k_name'),sf=$('#sf');
    const v=()=>sf.disabled=!ni.value.trim();ni.oninput=v;v();
    setTimeout(()=>{if(!ed)ni.focus();},350);
    $('#k_per').onclick=e=>{const b=e.target.closest('button');if(!b)return;d.period=b.dataset.p;$('#k_per').querySelectorAll('button').forEach(x=>x.dataset.on=(x===b?1:0));};
    $('#cf').onclick=closeSheet;
    sf.onclick=async()=>{
      const cur=parseFloat($('#k_cur').value)||0, tar=parseFloat($('#k_tar').value)||0;
      const payload={name:ni.value.trim(),unit:$('#k_unit').value.trim(),current:cur,target:tar,period:d.period};
      if(ed){const i=S.kpis.findIndex(x=>x.id===existing.id);S.kpis[i]={...S.kpis[i],...payload};}
      else{S.kpis.push({id:uid(),...payload,month:ym(),createdAt:now()});}
      await save();closeSheet();renderKpi();toast(ed?'已儲存':'指標已加入');
    };
    const del=$('#k_del'); if(del)del.onclick=async()=>{if(!confirm('刪除這個指標？'))return;S.kpis=S.kpis.filter(x=>x.id!==existing.id);await save();closeSheet();renderKpi();toast('已刪除');};
  }

  /* ============ 路由 ============ */
  function routeRender(){
    if(S.tab==='today')renderToday();
    else if(S.tab==='projects'){ if(S.openProject)renderProjectDetail(S.openProject); else renderProjects(); }
    else if(S.tab==='journal')renderJournal();
    else renderKpi();
  }
  function render(){ renderTopbar(); renderTabbar(); routeRender(); }

  $('#tabbar').addEventListener('click',e=>{const b=e.target.closest('.tab');if(!b)return;
    if(S.tab===b.dataset.tab && b.dataset.tab==='projects'){S.openProject=null;} S.tab=b.dataset.tab; render();});
  $('#scrim').addEventListener('click',closeSheet);
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet();});

  /* ============ 啟動 ============ */
  (async function init(){
    await load(); seedIfEmpty(); refreshMonthly(); await save();
    if(!storageOK) setTimeout(()=>toast('提示：此環境資料僅暫存本次'),700);
    render();
  })();
})();
</script>
</body>
</html>
