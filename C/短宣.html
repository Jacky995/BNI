<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短宣隊宣傳海報 - 滿版沉浸版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2c3e50;
            font-family: 'Noto Sans TC', sans-serif;
        }

        .poster-container {
            width: 800px;
            height: 1131px; /* A4 比例 */
            background-image: url('dts.jpg'); /* 你的照片 */
            background-size: cover;
            background-position: center 10%; /* 讓臉部盡量保持在上方 */
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 漸層遮罩：上半部透明保留人臉，下半部變暗以突顯文字 */
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.8) 40%, rgba(0,0,0,0) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 50px;
            box-sizing: border-box;
            text-align: center;
        }

        .title {
            font-size: 52px;
            font-weight: 900;
            color: #ffffff;
            margin: 0 0 5px 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            letter-spacing: 5px;
        }

        .subtitle {
            font-size: 28px;
            color: #f1c40f; /* 亮黃色 */
            font-weight: 700;
            margin: 0 0 20px 0;
            letter-spacing: 2px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }

        /* 日期極大化 */
        .date-box {
            font-size: 68px;
            font-weight: 900;
            color: #f1c40f; /* 亮黃色，最高視覺層級 */
            margin: 15px 0;
            line-height: 1.1;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.8);
        }

        .time-text {
            font-size: 32px;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .divider {
            width: 60px;
            height: 4px;
            background-color: #f1c40f;
            margin: 0 auto 25px auto;
        }

        .location-box {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px 30px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            margin-bottom: 25px;
        }

        .location-title {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .address-text {
            font-size: 18px;
            color: #e0e0e0;
            letter-spacing: 1px;
        }

        .activities {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
            word-spacing: 15px;
        }

        .free-tag {
            position: absolute;
            top: 40px;
            right: -40px;
            background-color: #e74c3c;
            color: white;
            padding: 10px 45px;
            font-size: 22px;
            font-weight: 900;
            transform: rotate(45deg);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="poster-container">
    <div class="free-tag">完全免費</div>
    <div class="overlay">
        <h1 class="title">遇見生命的光</h1>
        <h2 class="subtitle">美國 DTS 短宣隊來了！</h2>
        
        <div class="date-box">
            4/4 (四) - 4/5 (五)
        </div>
        <div class="time-text">
            晚上 7:00 - 9:00
        </div>

        <div class="divider"></div>
        
        <div class="location-box">
            <div class="location-title">📍 我們家教會</div>
            <div class="address-text">[請在此填寫教會完整地址]</div>
        </div>
        
        <div class="activities">
            ✨見證 🎭話劇 🎶詩歌 🎲遊戲
        </div>
    </div>
</div>

</body>
</html>
