<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTS短宣隊海報 - 終極視覺版</title>
    <!-- 引入專業字體：Noto Sans TC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* 品牌色彩定義 */
            --gold: #F5A623;
            --gold-light: #FFD166;
            --text-main: #F8F9FA;
            --text-muted: #CED4DA;
            --dark-overlay: #0b0c10;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Sans TC', sans-serif;
        }

        /* 畫布設定：嚴格A4比例 */
        .artboard {
            width: 800px;
            height: 1131px;
            background-color: #222;
            background-image: url('dts.jpg'); /* 你的照片 */
            background-size: cover;
            background-position: center 15%; /* 微調人臉位置 */
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* 電影級多段漸層遮罩 */
        .cinematic-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(11, 12, 16, 0) 0%,
                rgba(11, 12, 16, 0.2) 30%,
                rgba(11, 12, 16, 0.85) 60%,
                rgba(11, 12, 16, 0.98) 85%,
                rgba(11, 12, 16, 1) 100%
            );
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 70px;
            box-sizing: border-box;
        }

        /* 標題區塊 */
        .title-group {
            text-align: center;
            margin-bottom: 35px;
            transform: translateY(-10px);
        }

        .main-title {
            font-size: 64px;
            font-weight: 900;
            color: var(--text-main);
            margin: 0;
            letter-spacing: 8px;
            /* 模擬光的發散 */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 0 40px rgba(245, 166, 35, 0.4);
            line-height: 1.2;
        }

        .sub-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--gold);
            margin: 15px 0 0 0;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* 資訊膠囊：時間 */
        .date-capsule {
            background: linear-gradient(135deg, rgba(245, 166, 35, 0.15) 0%, rgba(245, 166, 35, 0.05) 100%);
            border: 1px solid rgba(245, 166, 35, 0.3);
            border-radius: 16px;
            padding: 20px 40px;
            text-align: center;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .date-text {
            font-size: 54px;
            font-weight: 900;
            color: var(--gold-light);
            margin: 0 0 5px 0;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .time-text {
            font-size: 24px;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: 3px;
        }

        /* 資訊區塊：地點 */
        .location-group {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }
        
        /* 裝飾線 */
        .location-group::before, .location-group::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 60px;
            height: 1px;
            background-color: rgba(255,255,255,0.2);
        }
        .location-group::before { left: -80px; }
        .location-group::after { right: -80px; }

        .loc-name {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .loc-address {
            font-size: 18px;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* 活動內容標籤 */
        .activities {
            display: flex;
            gap: 25px;
            margin-bottom: 20px;
        }

        .act-item {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }

        .act-icon {
            color: var(--gold);
            font-size: 22px;
        }

        /* 質感免費標籤 */
        .premium-free-tag {
            position: absolute;
            top: 40px;
            right: -50px;
            background: linear-gradient(90deg, #d32f2f, #f44336);
            color: white;
            padding: 10px 60px;
            font-size: 20px;
            font-weight: 900;
            transform: rotate(45deg);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.2);
            letter-spacing: 4px;
            z-index: 10;
            border-bottom: 2px solid rgba(0,0,0,0.3);
            text-align: center;
        }

    </style>
</head>
<body>

<div class="artboard">
    <div class="premium-free-tag">完全免費</div>
    
    <div class="cinematic-overlay">
        
        <div class="title-group">
            <h1 class="main-title">遇見生命的光</h1>
            <h2 class="sub-title">美國 DTS 短宣隊來了！</h2>
        </div>
        
        <div class="date-capsule">
            <div class="date-text">4/4 (四) - 4/5 (五)</div>
            <div class="time-text">晚上 7:00 - 9:00</div>
        </div>
        
        <div class="location-group">
            <div class="loc-name">📍 我們家教會</div>
            <div class="loc-address">臺中市龍井區遠東街179巷16號</div>
        </div>
        
        <div class="activities">
            <span class="act-item"><span class="act-icon">✨</span> 見證</span>
            <span class="act-item"><span class="act-icon">🎭</span> 話劇</span>
            <span class="act-item"><span class="act-icon">🎶</span> 詩歌</span>
            <span class="act-item"><span class="act-icon">🎲</span> 遊戲</span>
        </div>

    </div>
</div>

</body>
</html>
