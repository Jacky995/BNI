<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>全家福 月報表（含個人分析版）</title>
  <style>
    :root{
      --bg:#eef1f4;
      --card:#ffffff;
      --text:#1b1f24;
      --muted:#6b7280;
      --line:#e5e7eb;
      --shadow: 0 10px 25px rgba(0,0,0,0.08);
      --shadow2: 0 3px 10px rgba(0,0,0,0.06);
      --dark:#111827;
      --chip:#f3f4f6;
      --chipOn:#e7f1ff;
      --chipBorder:#3b82f6;
      --green:#16a34a;
      --red:#dc2626;
      --blue:#0891b2;
      --amber:#f59e0b;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:"Microsoft JhengHei", system-ui, -apple-system, "Segoe UI", sans-serif;
      color:var(--text);
      background:var(--bg);
      padding: max(12px, env(safe-area-inset-top)) 12px max(14px, env(safe-area-inset-bottom));
      -webkit-tap-highlight-color: transparent;
    }
    .controls{
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border:1px solid rgba(0,0,0,0.06);
      box-shadow: var(--shadow2);
      border-radius: 14px;
      padding: 12px;
      margin: 0 auto 12px auto;
      max-width: 1100px;
    }
    .title{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .title h1{ margin:0; font-size:18px; letter-spacing:.2px; }
    .updated{ font-size:12px; color:var(--muted); white-space:nowrap; }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content: space-between;
    }
    .chip{
      display:flex; align-items:center; gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: var(--chip);
      border: 2px solid transparent;
      user-select:none;
      cursor:pointer;
      font-weight: 800;
      font-size: 14px;
      line-height: 1;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .chip input{ transform: scale(1.25); }
    .chip.on{ background:var(--chipOn); border-color:var(--chipBorder); color:#0b3a82; }
    .inputs{
      display:flex; gap:8px; flex-wrap:wrap; align-items:center;
      flex: 1 1 320px;
    }
    .inputs label{
      font-size:12px; color:var(--muted); font-weight:900;
      display:flex; flex-direction:column; gap:6px;
    }
    .inputs input[type="month"], .inputs select{
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      outline: none;
      font-size: 14px;
      background:#fff;
      min-width: 160px;
    }
    .btn{
      border:0;
      background: var(--dark);
      color:#fff;
      padding: 11px 12px;
      border-radius: 12px;
      font-weight: 900;
      cursor:pointer;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .btn.secondary{ background: #374151; }
    .btn:disabled{ opacity:.6; cursor:not-allowed; }
    .stats{
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      text-align:left;
      line-height: 1.55;
      font-weight: 800;
    }

    #chartsArea{ max-width:1100px; margin:0 auto 12px auto; }
    .chartsGrid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 820px){
      .title h1{ font-size:22px; }
      .chartsGrid{ grid-template-columns: 1fr 1fr; }
    }
    .chartCard{
      background: var(--card);
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: var(--shadow);
      padding: 12px 12px 8px 12px;
      overflow:hidden;
    }
    .chartTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom: 8px;
      font-weight: 1000;
      font-size: 14px;
      color: #111827;
    }
    .chartWrap{
      position: relative;
      width: 100%;
      height: 240px;
    }
    @media (min-width: 820px){
      .chartWrap{ height: 260px; }
    }

    #app{ max-width:1100px; margin:0 auto; }
    .loading{
      text-align:center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 16px;
      font-weight: 800;
    }
    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 820px){
      .grid{ grid-template-columns: 1fr 1fr; }
    }
    @media (min-width: 1120px){
      .grid{ grid-template-columns: 1fr 1fr 1fr; }
    }

    details.personCard{
      background: var(--card);
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    summary.personHead{
      list-style:none;
      cursor:pointer;
      user-select:none;
      padding: 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-top: 6px solid #6c757d;
    }
    .name{
      font-weight: 1000;
      font-size: 16px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .count{
      background:#111827;
      color:#fff;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 1000;
      white-space:nowrap;
    }
    .body{
      padding: 10px 12px 12px;
      border-top: 1px solid var(--line);
      background:#fff;
    }

    .personAnalytics{
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 15px;
    }
    .analyticsTitle{
      font-size: 13px;
      font-weight: 800;
      color: #475569;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .task{
      border: 1px solid var(--line);
      border-left: 6px solid #c7c7c7;
      border-radius: 12px;
      padding: 10px 10px;
      background:#fff;
      margin-bottom: 10px;
    }
    .task.is-done{ border-left-color: var(--green); background:#ecfdf3; }
    .task.is-pending{ border-left-color: var(--blue); background:#e6fbff; }
    
    .rankWrap{
      margin-top: 12px;
      overflow:auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background:#fff;
    }
    table.rankTable{ width:100%; border-collapse: collapse; min-width: 900px; }
    .rankTable th, .rankTable td{
      padding: 10px 10px;
      border-bottom: 1px solid var(--line);
      text-align:left;
      font-size: 13px;
      font-weight: 900;
    }
    .badge{
      font-size: 12px;
      font-weight: 1100;
      padding: 2px 8px;
      border-radius: 999px;
      color:#fff;
      display:inline-block;
    }
    .badge.g{ background: var(--green); }
    .badge.b{ background: var(--blue); }
    .badge.am{ background: var(--amber); color:#111827; }
    
    #peopleArea{ max-width:1100px; margin:0 auto 12px auto; }
    .sectionCard{ background: var(--card); border-radius: 16px; border: 1px solid rgba(0,0,0,0.06); padding: 12px; }
  </style>
</head>
<body>
  <div class="controls">
    <div class="title">
      <h1>全家福 月報表（個人分析強化版）</h1>
      <div class="updated" id="updatedAt">—</div>
    </div>
    <div class="row">
      <div class="inputs">
        <label>月份 <input type="month" id="monthPick" /></label>
        <label>排行 <select id="sortMetric">
          <option value="score" selected>貢獻</option>
          <option value="amount">金額</option>
          <option value="done">已完成</option>
          <option value="total">件數</option>
        </select></label>
        <label class="chip on"><input type="checkbox" id="chkDoneOnly" checked /> 只看完成</label>
        <label class="chip on"><input type="checkbox" id="chkSplitAmount" checked /> 金額平分</label>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn secondary" id="btnToggleAll">全部展開</button>
        <button class="btn" id="btnReload">重載</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </div>

  <div id="peopleArea"></div>
  <div id="chartsArea"></div>
  <div id="app" class="loading">資料讀取中...</div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
  // CONFIG
  const CONFIG = {
    apiKey: "UGQ4cGFmNjg2R0J2TXNSMXpZdVVvSlhIUVRLZHo2SmpISXUyMFQrRCtySXFDTUk2T2NCeUY4b0FDcXJ6OENqRA==",
    baseUrl: "https://ap12.ragic.com/89793238/fami/2",
    fields: {
      status: "1000111",
      date: "1000122",
      person: "1000113",
      reason: "1000120",
      addr: "1000119",
      name: "1000116",
      amount: "1000114"
    },
    person: { placeholderName: "待指派", stripNotes: true, aliases: {} }
  };

  let ALL_RECORDS = [];
  const CHARTS = {};

  // Utils
  function getThisMonthValue(){ const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; }
  function getValue(r, id){
    const v = r?.[id]; if (v == null) return "";
    if (typeof v === "object") return Array.isArray(v) ? v.map(x=>x.text||"").join(",") : (v.text||"");
    return String(v);
  }
  function escapeHtml(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function pid(s){ return "p_" + btoa(encodeURIComponent(s||"p")).replace(/=/g,"").slice(-10); }

  async function jsonp(url) {
    const cb = "cb" + Math.random().toString(16).slice(2);
    return new Promise((res, rej) => {
      window[cb] = (d) => { delete window[cb]; s.remove(); res(d); };
      const s = document.createElement("script");
      s.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cb;
      document.head.appendChild(s);
    });
  }

  // 人員解析
  function parsePersons(text){
    let raw = String(text||"").replace(/[，、；;／/\\|+&。．·]/g, ",").trim();
    if(!raw) return [CONFIG.person.placeholderName];
    let tokens = raw.split(",").map(t => t.trim()).filter(Boolean);
    return tokens.map(t => {
      let x = t.replace(/\([^)]*\)|（[^）]*）|【[^】]*】/g, "").trim();
      return x || CONFIG.person.placeholderName;
    });
  }

  async function loadFromRagic(){
    try{
      document.getElementById("app").innerHTML = `<div class="loading">正在同步 Ragic 數據...</div>`;
      const url = `${CONFIG.baseUrl}?api=&APIKey=${CONFIG.apiKey}&naming=EID&limit=5000&reverse=true`;
      const data = await jsonp(url);
      ALL_RECORDS = Object.values(data || {}).filter(v => v && v._ragicId);
      render();
    }catch(e){ document.getElementById("app").innerHTML = `<div class="err">載入失敗，請檢查網路或 API Key</div>`; }
  }

  function render(){
    const monthVal = document.getElementById("monthPick").value || getThisMonthValue();
    const monthKey = monthVal.replace("-", "/");
    const splitAmt = document.getElementById("chkSplitAmount").checked;
    const doneOnly = document.getElementById("chkDoneOnly").checked;

    const base = ALL_RECORDS.filter(r => (getValue(r, CONFIG.fields.date)).startsWith(monthKey) && getValue(r, CONFIG.fields.status) !== "取消");
    
    // 計算邏輯
    const pMap = new Map();
    base.forEach(r => {
      const ps = parsePersons(getValue(r, CONFIG.fields.person));
      const status = getValue(r, CONFIG.fields.status);
      const amt = parseFloat(getValue(r, CONFIG.fields.amount).replace(/,/g,"")) || 0;
      
      ps.forEach(p => {
        if(!pMap.has(p)) pMap.set(p, { name: p, total: 0, done: 0, amount: 0, records: [] });
        const o = pMap.get(p);
        o.total++;
        if(status === "已完成") {
          o.done++;
          o.amount += (splitAmt ? amt/ps.length : amt);
        }
        o.records.push(r);
      });
    });

    const rows = Array.from(pMap.values()).sort((a,b) => b.total - a.total);

    // 渲染總覽表格 (簡略版)
    document.getElementById("peopleArea").innerHTML = `
      <div class="sectionCard">
        <div class="analyticsTitle">🏆 人員戰力榜</div>
        <div class="rankWrap">
          <table class="rankTable">
            <thead><tr><th>人員</th><th>件數</th><th>完成</th><th>金額</th></tr></thead>
            <tbody>
              ${rows.slice(0,10).map(r => `<tr><td>${r.name}</td><td>${r.total}</td><td>${r.done}</td><td>${Math.round(r.amount).toLocaleString()}</td></tr>`).join("")}
            </tbody>
          </table>
        </div>
      </div>`;

    // 渲染下方個人明細與分析
    let html = `<div class="grid">`;
    const dim = new Date(monthVal.split("-")[0], monthVal.split("-")[1], 0).getDate();
    const dayLabels = Array.from({length:dim}, (_,i)=>i+1);

    rows.forEach(r => {
      const pId = pid(r.name);
      // 過濾顯示列表
      const displayRecs = doneOnly ? r.records.filter(x => getValue(x, CONFIG.fields.status) === "已完成") : r.records;
      if (displayRecs.length === 0) return;

      html += `
        <details class="personCard" id="${pId}">
          <summary class="personHead">
            <div class="name">${escapeHtml(r.name)} <span class="count">${r.total}單</span></div>
            <div class="badge am">${Math.round(r.done/r.total*100)}%</div>
          </summary>
          <div class="body">
            <div class="personAnalytics">
              <div class="analyticsTitle"><span>📊 每日作業分佈</span> <span style="font-size:11px">本月累計：${r.total} 件</span></div>
              <div style="height:100px;"><canvas id="chart_${pId}"></canvas></div>
            </div>
            ${displayRecs.map(rec => `
              <div class="task ${getValue(rec, CONFIG.fields.status)==='已完成'?'is-done':'is-pending'}">
                <div style="font-weight:bold; font-size:14px;">${escapeHtml(getValue(rec, CONFIG.fields.name))}</div>
                <div style="font-size:12px; color:#666; margin-top:4px;">
                  📅 ${getValue(rec, CONFIG.fields.date).slice(5,10)} | ${escapeHtml(getValue(rec, CONFIG.fields.reason))}
                </div>
              </div>
            `).join("")}
          </div>
        </details>`;
    });
    html += `</div>`;
    document.getElementById("app").innerHTML = html;

    // 渲染個人 Chart
    rows.forEach(r => {
      const pId = pid(r.name);
      const canvas = document.getElementById(`chart_${pId}`);
      if(!canvas) return;

      const dayData = Array(dim).fill(0);
      r.records.forEach(rec => {
        const d = getValue(rec, CONFIG.fields.date);
        const day = parseInt(d.split("/")[2] || d.split("-")[2]);
        if(day > 0 && day <= dim) dayData[day-1]++;
      });

      new Chart(canvas, {
        type: 'bar',
        data: {
          labels: dayLabels,
          datasets: [{ data: dayData, backgroundColor: '#3b82f6', borderRadius: 2 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { 
            y: { display: false, beginAtZero: true },
            x: { grid: { display: false }, ticks: { font: { size: 8 } } }
          }
        }
      });
    });
    
    document.getElementById("stats").innerText = `${monthKey} 總計處理 ${base.length} 件專案`;
  }

  // UI Events
  document.getElementById("btnReload").onclick = loadFromRagic;
  document.getElementById("monthPick").onchange = render;
  document.getElementById("chkDoneOnly").onchange = render;
  document.getElementById("chkSplitAmount").onchange = render;
  document.getElementById("btnToggleAll").onclick = () => {
    const cards = document.querySelectorAll("details.personCard");
    const isExpanding = document.getElementById("btnToggleAll").innerText === "全部展開";
    cards.forEach(c => c.open = isExpanding);
    document.getElementById("btnToggleAll").innerText = isExpanding ? "全部收合" : "全部展開";
  };

  window.onload = () => {
    document.getElementById("monthPick").value = getThisMonthValue();
    loadFromRagic();
  };
</script>
</body>
</html>
