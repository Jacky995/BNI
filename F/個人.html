<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>全家福 當日總覽（分組版）</title>
  <style>
    :root{
      --bg:#f3f4f6; --card:#ffffff; --text:#1f2937; --muted:#6b7280;
      --primary:#2563eb; --green:#16a34a; --red:#dc2626; --amber:#d97706;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
    }
    *{box-sizing:border-box;}
    body{
      margin:0; font-family:"Microsoft JhengHei", system-ui, sans-serif;
      background:var(--bg); color:var(--text);
      padding: max(16px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
      -webkit-tap-highlight-color: transparent;
    }
    
    /* === Header === */
    .header{ max-width: 600px; margin: 0 auto 16px; display:flex; flex-direction:column; gap:12px; }
    .topRow{ display:flex; justify-content:space-between; align-items:center; }
    h1{ margin:0; font-size:20px; font-weight:900; letter-spacing:.5px; }
    .status{ font-size:12px; color:var(--muted); font-weight:700; }

    .controls{
      background: var(--card); padding: 12px; border-radius: 16px;
      box-shadow: var(--shadow); display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    }
    .input-group{ display:flex; flex-direction:column; gap:4px; flex:1; min-width:140px; }
    .input-group label{ font-size:11px; color:var(--muted); font-weight:800; text-transform:uppercase; }
    input[type="date"], select{
      width:100%; padding: 10px; border-radius:10px; border:1px solid #e5e7eb;
      background:#f9fafb; font-size:15px; font-weight:600; outline:none; appearance:none;
    }
    
    .btn{
      border:0; background:var(--text); color:#fff; padding:10px 16px; border-radius:10px;
      font-weight:700; cursor:pointer; white-space:nowrap; height:42px; align-self:flex-end;
    }

    /* === Hero Stats === */
    .hero{
      max-width: 600px; margin: 0 auto 16px;
      display:grid; grid-template-columns: 1fr 1fr; gap:12px;
    }
    .statCard{
      background: var(--card); padding: 16px; border-radius: 16px;
      box-shadow: var(--shadow); display:flex; flex-direction:column; justify-content:center;
    }
    .statLabel{ font-size:12px; color:var(--muted); font-weight:800; margin-bottom:4px; }
    .statValue{ font-size:24px; font-weight:1000; color:var(--text); }
    .statSub{ font-size:12px; font-weight:700; margin-top:4px; color:var(--muted); }
    .c-green{ color:var(--green); } 

    /* === List Area === */
    #listArea{ max-width: 600px; margin: 0 auto; padding-bottom:40px; }
    .empty{ text-align:center; padding:40px 0; color:var(--muted); font-weight:700; }

    /* Group Header */
    .group-header{
      display:flex; justify-content:space-between; align-items:center;
      margin: 24px 0 12px 0; padding-bottom: 8px;
      border-bottom: 2px solid #e5e7eb;
      color: var(--text); font-weight: 1000; font-size: 18px;
    }
    .group-header .badge{
      font-size: 12px; background: #e5e7eb; color: #374151;
      padding: 4px 10px; border-radius: 99px; font-weight: 800;
    }

    /* Task Card */
    .taskCard{
      background: var(--card); border-radius: 14px; padding: 14px;
      margin-bottom: 12px; box-shadow: var(--shadow);
      border-left: 5px solid #d1d5db; position:relative;
    }
    .taskCard.done{ border-left-color: var(--green); background: #f0fdf4; }
    .taskCard.pending{ border-left-color: var(--primary); background: #eff6ff; }
    .taskCard.cancel{ border-left-color: var(--red); opacity:0.7; }

    .t-head{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
    .t-name{ font-size:16px; font-weight:900; color:#111827; }
    .t-status{ font-size:11px; font-weight:800; padding:3px 8px; border-radius:99px; background:#e5e7eb; white-space:nowrap; }
    .done .t-status{ background:#dcfce7; color:#166534; }
    .pending .t-status{ background:#dbeafe; color:#1e40af; }
    
    .t-body{ font-size:14px; color:#4b5563; line-height:1.5; font-weight:500; }
    .money-tag{
      margin-top:8px; display:inline-flex; align-items:center; gap:4px;
      background: #fff; border:1px solid #e5e7eb; 
      padding:4px 10px; border-radius:8px; font-size:12px; font-weight:800; color:#059669;
    }
    .hidden{ display:none !important; }
    .loading-overlay{
      position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(255,255,255,0.9);
      z-index:999; display:flex; align-items:center; justify-content:center;
      font-weight:900; color:var(--muted); flex-direction:column; gap:10px;
    }
  </style>
</head>
<body>

<div id="loader" class="loading-overlay">
  <div>讀取資料庫中...</div>
</div>

<div class="header">
  <div class="topRow">
    <h1>全家福 當日總覽</h1>
    <div class="status" id="updateTime">...</div>
  </div>
  
  <div class="controls">
    <div class="input-group">
      <label>日期 (Date)</label>
      <input type="date" id="datePick">
    </div>
    <div class="input-group">
      <label>篩選 (Filter)</label>
      <select id="personPick">
        <option value="">(顯示全體)</option>
      </select>
    </div>
    <button class="btn" id="btnReload">重刷</button>
  </div>
</div>

<div class="hero">
  <div class="statCard">
    <div class="statLabel">當日總件數 (Total)</div>
    <div class="statValue" id="valCount">0</div>
    <div class="statSub" id="valRate">完成率 0%</div>
  </div>
  <div class="statCard">
    <div class="statLabel">當日總產值 (Value)</div>
    <div class="statValue c-green" id="valMoney">$0</div>
    <div class="statSub">不重複計算</div>
  </div>
</div>

<div id="listArea"></div>

<script>
  const CONFIG = {
    apiKey: "UGQ4cGFmNjg2R0J2TXNSMXpZdVVvSlhIUVRLZHo2SmpISXUyMFQrRCtySXFDTUk2T2NCeUY4b0FDcXJ6OENqRA==",
    baseUrl: "https://ap12.ragic.com/89793238/fami/2",
    fields: {
      status: "1000111", date: "1000122", person: "1000113",
      reason: "1000120", addr: "1000119", name: "1000116", amount: "1000114"
    },
    person: {
      placeholderName: "未指派", stripNotes: true,
      removeSuffixes: [/師傅$/g, /師父$/g, /先生$/g, /小姐$/g, /師$/g, /傅$/g]
    }
  };

  let ALL_RECORDS = [];

  function jsonp(url) {
    return new Promise((resolve, reject) => {
      const cb = "__ragic_" + Date.now().toString(36);
      window[cb] = (data) => { delete window[cb]; s.remove(); resolve(data); };
      const s = document.createElement("script");
      s.src = url + "&callback=" + cb;
      s.onerror = () => { delete window[cb]; s.remove(); reject(); };
      document.head.appendChild(s);
    });
  }

  function getValue(r, id){
    const v = r?.[id];
    if(typeof v === "object") return String(v.text||v.value||v.name||"");
    return String(v||"");
  }

  // ✅ 核心修正：強制格式統一
  function date10(r){
    return getValue(r, CONFIG.fields.date).substring(0, 10).replace(/\//g, "-");
  }

  function parseAmount(v){
    const n = Number(String(v||"").replace(/[,$\sNT]/gi,""));
    return isFinite(n) ? n : 0;
  }

  function parsePersons(raw){
    let s = String(raw||"").normalize("NFKC").trim();
    if(CONFIG.person.stripNotes) s = s.replace(/\([^)]*\)|（[^）]*）|\[[^\]]*\]/g, "");
    const tokens = s.split(/[,，、/&]/).map(t => {
      let name = t.trim();
      for(const re of CONFIG.person.removeSuffixes) name = name.replace(re, "");
      return name.trim();
    }).filter(Boolean);
    return tokens.length ? tokens : ["未指派"];
  }

  async function loadData(){
    const loader = document.getElementById("loader");
    loader.classList.remove("hidden");
    try {
      const data = await jsonp(`${CONFIG.baseUrl}?api=&APIKey=${CONFIG.apiKey}&naming=EID&limit=2000&reverse=true`);
      ALL_RECORDS = Object.values(data || {}).filter(x => x && x._ragicId);
      
      // Build Person Dropdown (Optional Filter)
      const pSet = new Set();
      ALL_RECORDS.forEach(r => parsePersons(getValue(r, CONFIG.fields.person)).forEach(p => pSet.add(p)));
      const sortedP = [...pSet].sort();
      
      const sel = document.getElementById("personPick");
      sel.innerHTML = `<option value="">(顯示全體 - 按人員分組)</option>` + 
        sortedP.map(p => `<option value="${p}">${p}</option>`).join("");
      
      // 移除這裡的 LocalStorage 自動選取，確保預設是「顯示全體」
      
      setUpdateTime();
      render();
    } catch(e) { alert("讀取失敗"); console.error(e); } 
    finally { loader.classList.add("hidden"); }
  }

  function setUpdateTime(){
    const now = new Date();
    document.getElementById("updateTime").innerText = 
      `Updated ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  }

  function renderCard(r, highlightPerson){
    const status = getValue(r, CONFIG.fields.status);
    const isDone = status === "已完成";
    const isCancel = status === "取消";
    const cls = isDone ? "done" : (isCancel ? "cancel" : "pending");
    const rawAmt = parseAmount(getValue(r, CONFIG.fields.amount));
    const pp = parsePersons(getValue(r, CONFIG.fields.person));
    
    // 如果是分組顯示，標註一下合力的人
    const otherPeople = highlightPerson ? pp.filter(p => p !== highlightPerson) : pp;
    const note = otherPeople.length > 0 ? `(與 ${otherPeople.join(", ")} 合力)` : "";

    // 分潤計算 (僅顯示參考)
    const share = rawAmt > 0 ? Math.round(rawAmt / Math.max(1, pp.length)) : 0;

    return `
      <div class="taskCard ${cls}">
        <div class="t-head">
          <div class="t-name">${getValue(r, CONFIG.fields.name)||"無客名"}</div>
          <div class="t-status">${status}</div>
        </div>
        <div class="t-body">
          <div style="font-weight:700; color:#1f2937;">${getValue(r, CONFIG.fields.reason)||"無事項"}</div>
          <div style="margin-top:4px;">📍 ${getValue(r, CONFIG.fields.addr)||"無地址"}</div>
          ${rawAmt > 0 ? `
            <div class="money-tag">
              💰 ${share.toLocaleString()}
              ${pp.length>1 ? `<span style="color:#6b7280; font-weight:400; margin-left:4px;">(總額 ${rawAmt.toLocaleString()})</span>` : ""}
            </div>
          ` : ""}
          ${note ? `<div style="margin-top:6px; font-size:12px; color:#6b7280;">👥 ${note}</div>` : ""}
        </div>
      </div>
    `;
  }

  function render(){
    const dateVal = document.getElementById("datePick").value;
    const personVal = document.getElementById("personPick").value;
    const listArea = document.getElementById("listArea");
    
    // 1. 先抓出當天所有單據 (用於上方統計)
    const todayAllRecs = ALL_RECORDS.filter(r => date10(r) === dateVal);
    
    // 2. 計算全體統計 (不重複計算)
    let totalC = 0, doneC = 0, totalM = 0;
    todayAllRecs.forEach(r => {
      const st = getValue(r, CONFIG.fields.status);
      if(st !== "取消"){
        totalC++;
        if(st === "已完成") doneC++;
        totalM += parseAmount(getValue(r, CONFIG.fields.amount));
      }
    });
    document.getElementById("valCount").innerText = `${doneC} / ${totalC}`;
    const rate = totalC ? Math.round(doneC/totalC*100) : 0;
    document.getElementById("valRate").innerText = `完成率 ${rate}%`;
    document.getElementById("valMoney").innerText = `$${totalM.toLocaleString()}`;

    // 3. 渲染列表
    let html = "";
    
    if(todayAllRecs.length === 0){
      listArea.innerHTML = `<div class="empty">📅 ${dateVal} 無資料</div>`;
      return;
    }

    if(personVal){
      // === 單人模式 (過濾顯示) ===
      const myRecs = todayAllRecs.filter(r => parsePersons(getValue(r, CONFIG.fields.person)).includes(personVal));
      html += `<div class="group-header">${personVal} <span class="badge">${myRecs.length}</span></div>`;
      if(myRecs.length === 0) html += `<div class="empty">無指派工作</div>`;
      else html += myRecs.map(r => renderCard(r, personVal)).join("");

    } else {
      // === 全體分組模式 (預設) ===
      // 找出今天有工作的所有人
      const activePeople = new Set();
      todayAllRecs.forEach(r => parsePersons(getValue(r, CONFIG.fields.person)).forEach(p => activePeople.add(p)));
      const sortedActive = [...activePeople].sort();

      if(sortedActive.length === 0){
         html = `<div class="empty">有單據但未指派人員</div>`;
      } else {
        sortedActive.forEach(p => {
          // 抓出這個人的單
          const pRecs = todayAllRecs.filter(r => parsePersons(getValue(r, CONFIG.fields.person)).includes(p));
          
          // 排序：完成的沉底
          pRecs.sort((a,b) => {
            const sa = getValue(a, CONFIG.fields.status)==="已完成"?1:0;
            const sb = getValue(b, CONFIG.fields.status)==="已完成"?1:0;
            return sa - sb;
          });

          html += `
            <div class="group-header">
              ${p} <span class="badge">${pRecs.length}</span>
            </div>
            ${pRecs.map(r => renderCard(r, p)).join("")}
          `;
        });
        
        // 檢查是否有「未指派」的單
        const unassigned = todayAllRecs.filter(r => parsePersons(getValue(r, CONFIG.fields.person))[0] === "未指派");
        if(unassigned.length > 0){
          html += `<div class="group-header" style="color:#dc2626;">⚠️ 未指派人員 <span class="badge">${unassigned.length}</span></div>`;
          html += unassigned.map(r => renderCard(r, null)).join("");
        }
      }
    }
    
    listArea.innerHTML = html;
  }

  (function(){
    const d = new Date();
    document.getElementById("datePick").value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    
    document.getElementById("btnReload").addEventListener("click", loadData);
    document.getElementById("datePick").addEventListener("change", render);
    document.getElementById("personPick").addEventListener("change", render);
    
    loadData();
  })();
</script>
</body>
</html>
