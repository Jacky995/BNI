<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>全家福｜老闆戰情室</title>
  <style>
    :root{
      --bg:#eef1f4;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --shadow: 0 10px 25px rgba(0,0,0,0.08);
      --shadow2: 0 3px 10px rgba(0,0,0,0.06);
      --dark:#111827;
      --chip:#f3f4f6;
      --chipOn:#e7f1ff;
      --chipBorder:#3b82f6;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:"Microsoft JhengHei", system-ui, -apple-system, "Segoe UI", sans-serif;
      color:var(--text);
      background:var(--bg);
      padding: max(12px, env(safe-area-inset-top)) 12px max(14px, env(safe-area-inset-bottom));
      -webkit-tap-highlight-color: transparent;
    }
    .wrap{ max-width:1100px; margin:0 auto; }
    .controls{
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border:1px solid rgba(0,0,0,0.06);
      box-shadow: var(--shadow2);
      border-radius: 14px;
      padding: 12px;
      margin: 0 auto 12px auto;
    }
    .title{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .title h1{ margin:0; font-size:18px; letter-spacing:.2px; font-weight:1000;}
    .updated{ font-size:12px; color:var(--muted); white-space:nowrap; font-weight:900;}

    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .inputs{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; flex:1 1 340px; }
    .inputs label{
      font-size:12px; color:var(--muted); font-weight:900;
      display:flex; flex-direction:column; gap:6px;
    }
    .inputs input[type="month"], .inputs select{
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      outline: none;
      font-size: 14px;
      background:#fff;
      min-width: 160px;
      font-weight:900;
    }
    .chip{
      display:flex; align-items:center; gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: var(--chip);
      border: 2px solid transparent;
      user-select:none;
      cursor:pointer;
      font-weight: 900;
      font-size: 14px;
      line-height: 1;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .chip input{ transform: scale(1.15); }
    .chip.on{ background:var(--chipOn); border-color:var(--chipBorder); color:#0b3a82; }

    .btn{
      border:0;
      background: var(--dark);
      color:#fff;
      padding: 11px 12px;
      border-radius: 12px;
      font-weight: 1000;
      cursor:pointer;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .btn.secondary{ background: #374151; }
    .btn:disabled{ opacity:.6; cursor:not-allowed; }

    .card{
      background: var(--card);
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: var(--shadow);
      padding: 12px;
      overflow:hidden;
      margin-bottom: 12px;
    }
    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 820px){
      .title h1{ font-size:22px; }
      .grid{ grid-template-columns: 1fr 1fr; }
    }

    .chartTitle{
      font-weight: 1100;
      font-size: 15px;
      margin: 0 0 8px 0;
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:baseline;
    }
    .chartTitle small{
      color:var(--muted);
      font-size: 12px;
      font-weight: 900;
      white-space:nowrap;
    }
    .subHint{
      font-size: 12px;
      color: var(--muted);
      font-weight: 900;
      margin-top: 8px;
      line-height: 1.55;
    }
    .statsLine{
      font-size: 12px;
      color: var(--muted);
      font-weight: 900;
      line-height: 1.6;
      margin-top: 8px;
    }
    .highlight-stat {
        color: #0b3a82;
        background: #e7f1ff;
        padding: 2px 6px;
        border-radius: 4px;
        border: 1px solid #3b82f6;
    }

    /* boss mode: hide numbers */
    .num{ display:inline; }
    body.bossHideNums .num{ display:none !important; }
    body.bossHideNums #detailsArea{ display:none; }

    .svgWrap{ width:100%; overflow:hidden; }
    svg{ width:100%; height:auto; }

    details.person{
      background:#fff;
      border-radius: 14px;
      border:1px solid var(--line);
      overflow:hidden;
    }
    summary.personHead{
      list-style:none;
      cursor:pointer;
      user-select:none;
      padding: 12px 12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      font-weight:1000;
    }
    summary.personHead::-webkit-details-marker{ display:none; }
    .pill{
      font-size: 12px;
      font-weight: 1000;
      padding: 4px 8px;
      border-radius: 999px;
      background: #f3f4f6;
      color:#111827;
      white-space:nowrap;
    }
    .personBody{ padding: 10px 12px 12px; border-top:1px solid var(--line); }
    .task{
      border:1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      background:#fff;
    }
    .task:last-child{ margin-bottom:0; }
    .taskTop{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      font-weight:1000;
    }
    .tag{
      padding: 3px 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 1000;
      color:#111827;
      border:1px solid #111827;
      white-space:nowrap;
      background:#fff;
    }
    .muted{ color:var(--muted); font-weight:900; }
    .err{
      color:#b00020;
      font-weight:1000;
      background:#fff;
      border:1px solid #ffd2d6;
      border-radius:14px;
      padding:12px;
      box-shadow: var(--shadow2);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="controls">
      <div class="title">
        <h1>全家福｜月報表（老闆戰情室）</h1>
        <div class="updated" id="updatedAt">—</div>
      </div>

      <div class="row">
        <div class="inputs">
          <label>
            月份
            <input type="month" id="monthPick" />
          </label>

          <label>
            排名依據
            <select id="sortMetric">
              <option value="money" selected>金額</option>
              <option value="count">件數</option>
            </select>
          </label>

          <label class="chip on" id="chipBoss" style="margin-top:18px;">
            <input type="checkbox" id="chkBossMode" checked />
            老闆模式（隱藏明細/小字）
          </label>

          <label class="chip on" id="chipMoneyDoneOnly" style="margin-top:18px;">
            <input type="checkbox" id="chkMoneyDoneOnly" checked />
            金額只算已完成
          </label>

          <label class="chip on" id="chipSplitMoney" style="margin-top:18px;">
            <input type="checkbox" id="chkSplitMoney" checked />
            多人金額平分
          </label>

          <label class="chip" id="chipShowDetails" style="margin-top:18px;">
            <input type="checkbox" id="chkShowDetails" />
            顯示明細
          </label>
        </div>

        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn secondary" id="btnReload">重載數據</button>
        </div>
      </div>

      <div class="statsLine" id="stats"></div>
    </div>

    <div id="dashArea"></div>
    <div id="detailsArea"></div>
  </div>

<script>
  // =============================
  // ✅ CONFIG: 你的 Ragic 設定
  // =============================
  const CONFIG = {
    apiKey: "UGQ4cGFmNjg2R0J2TXNSMXpZdVVvSlhIUVRLZHo2SmpISXUyMFQrRCtySXFDTUk2T2NCeUY4b0FDcXJ6OENqRA==",
    baseUrl: "https://ap12.ragic.com/89793238/fami/2",
    fields: {
      status: "1000111",
      date:   "1000122",
      person: "1000113",
      reason: "1000120",
      addr:   "1000119",
      name:   "1000116",
      amount: "1000114"
    },
    person: {
      placeholderName: "待指派",
      removeSuffixes: [/師傅$/g, /師父$/g, /先生$/g, /小姐$/g, /師$/g, /傅$/g],
      aliases: {} 
    }
  };

  // =============================
  // State
  // =============================
  let ALL_RECORDS = [];
  let IS_LOADING = false;

  // =============================
  // JSONP
  // =============================
  function jsonp(url) {
    return new Promise((resolve, reject) => {
      const cb = "__ragic_cb_" + Date.now() + "_" + Math.random().toString(16).slice(2);
      window[cb] = (data) => { cleanup(); resolve(data); };

      const s = document.createElement("script");
      s.src = url + (url.includes("?") ? "&" : "?") + "callback=" + encodeURIComponent(cb);
      s.onerror = () => { cleanup(); reject(new Error("JSONP failed")); };

      function cleanup(){
        try { delete window[cb]; } catch(e){ window[cb] = undefined; }
        s.remove();
      }
      document.head.appendChild(s);
    });
  }

  function getThisMonthValue(){
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    return `${yyyy}-${mm}`;
  }

  function setUpdatedNow(){
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,"0");
    const mm = String(d.getMinutes()).padStart(2,"0");
    document.getElementById("updatedAt").innerText = `更新 ${hh}:${mm}`;
  }

  function syncChips(){
    const boss = document.getElementById("chkBossMode").checked;
    document.getElementById("chipBoss").classList.toggle("on", boss);
    const mdo = document.getElementById("chkMoneyDoneOnly").checked;
    document.getElementById("chipMoneyDoneOnly").classList.toggle("on", mdo);
    const sm = document.getElementById("chkSplitMoney").checked;
    document.getElementById("chipSplitMoney").classList.toggle("on", sm);
    const sd = document.getElementById("chkShowDetails").checked;
    document.getElementById("chipShowDetails").classList.toggle("on", sd);
  }

  function escapeHtml(s){
    return String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function getValue(r, id){
    const v = r?.[id];
    if (v == null) return "";
    if (typeof v === "object") {
      if (Array.isArray(v)) return v.map(x => (x?.text ?? x?.value ?? x?._index_title_ ?? x?.name ?? "")).join(",");
      return String(v.text ?? v.value ?? v._index_title_ ?? v.name ?? "");
    }
    return String(v);
  }

  function normalizeText(s){
    return String(s ?? "").normalize("NFKC").replace(/\u00A0/g, " ").replace(/[\u200B-\u200D\uFEFF]/g, "").trim();
  }

  function unifySeparators(s){
    return String(s ?? "").replace(/[，、﹐﹑､]/g, ",").replace(/[；﹔;]/g, ",").replace(/[／/\\|｜]/g, ",").replace(/[＋+&＆]/g, ",").replace(/[。．·•●・]/g, ",").replace(/[\n\r\t]+/g, ",").replace(/\s{2,}/g, " ").trim();
  }

  function stripBracketNotes(s){
    return String(s ?? "").replace(/\([^)]*\)/g, "").replace(/（[^）]*）/g, "").replace(/\[[^\]]*\]/g, "").replace(/【[^】]*】/g, "").replace(/\{[^}]*\}/g, "").replace(/「[^」]*」/g, "").trim();
  }

  function canonName(raw){
    let x = normalizeText(raw);
    if (!x) return CONFIG.person.placeholderName;
    x = stripBracketNotes(x);
    x = x.replace(/^[\s,，、.。·•]+|[\s,，、.。·•]+$/g, "").trim();
    const cjkCount = (x.match(/[\u4e00-\u9fff]/g) || []).length;
    const latinCount = (x.match(/[A-Za-z]/g) || []).length;
    if (cjkCount >= 1 && latinCount === 0) x = x.replace(/\s+/g, "");
    else x = x.replace(/\s+/g, " ").trim();
    for (const re of (CONFIG.person.removeSuffixes || [])) x = x.replace(re, "");
    x = x.trim();
    const placeholders = new Set(["", "-", "—", "無", "未填", "未指派", "待指派", "n/a", "na", "null", "none"]);
    if (placeholders.has(x.toLowerCase()) || placeholders.has(x)) return CONFIG.person.placeholderName;
    const aliasMap = CONFIG.person.aliases || {};
    if (aliasMap[x] != null) x = aliasMap[x];
    return x || CONFIG.person.placeholderName;
  }

  function parsePersons(personText){
    let raw = normalizeText(personText);
    raw = unifySeparators(raw);
    if (!raw) return [CONFIG.person.placeholderName];
    const tokens = raw.split(",").map(t => canonName(t)).filter(Boolean);
    const uniq = [];
    const seen = new Set();
    for (const p of tokens){
      if (!seen.has(p)){ seen.add(p); uniq.push(p); }
    }
    return uniq.length ? uniq : [CONFIG.person.placeholderName];
  }

  function date10(r){
    const raw = getValue(r, CONFIG.fields.date) || "";
    return raw ? raw.substring(0,10) : "";
  }
  function monthKeyFromRecord(r){
    const raw = getValue(r, CONFIG.fields.date) || "";
    return raw ? raw.substring(0,7).replace("-", "/") : "";
  }

  function parseAmount(v){
    const s = String(v ?? "").trim();
    if (!s) return null;
    const cleaned = s.replace(/[,$\s]/g, "").replace(/[元ＮＴntNT]/g, "");
    const n = Number(cleaned);
    if (!Number.isFinite(n)) return null;
    return n;
  }

  function fmtMoney(n){
    const v = Math.round(Number(n) || 0);
    return v.toLocaleString();
  }

  function setLoading(flag){
    IS_LOADING = flag;
    document.getElementById("btnReload").disabled = flag;
  }

  // =============================
  // SVG helpers
  // =============================
  function polarToCartesian(cx, cy, r, angleDeg){
    const a = (angleDeg - 90) * Math.PI / 180;
    return { x: cx + (r * Math.cos(a)), y: cy + (r * Math.sin(a)) };
  }

  function describeDonutArc(cx, cy, rOuter, rInner, startAngle, endAngle){
    const startOuter = polarToCartesian(cx, cy, rOuter, endAngle);
    const endOuter   = polarToCartesian(cx, cy, rOuter, startAngle);
    const startInner = polarToCartesian(cx, cy, rInner, startAngle);
    const endInner   = polarToCartesian(cx, cy, rInner, endAngle);
    const largeArc = (endAngle - startAngle) <= 180 ? "0" : "1";
    return [
      `M ${startOuter.x} ${startOuter.y}`,
      `A ${rOuter} ${rOuter} 0 ${largeArc} 0 ${endOuter.x} ${endOuter.y}`,
      `L ${startInner.x} ${startInner.y}`,
      `A ${rInner} ${rInner} 0 ${largeArc} 1 ${endInner.x} ${endInner.y}`,
      "Z"
    ].join(" ");
  }

  function statusBucket(status){
    const s = normalizeText(status);
    if (s.includes("已完成")) return "已完成";
    if (s.includes("待處理")) return "待處理";
    if (s.includes("未完成")) return "未完成";
    if (s.includes("延期")) return "延期";
    if (s.includes("取消")) return "取消";
    return "其他";
  }

  function svgStatusDonut(statusCounts){
    const order = ["已完成","待處理","未完成","延期","取消","其他"];
    const total = order.reduce((s,k)=> s + (statusCounts[k]||0), 0) || 1;
    const pat = { "已完成": "patSolid", "待處理": "patDiag", "未完成": "patDots", "延期": "patCross", "取消": "patLightDiag", "其他": "patGray" };
    let angle = 0;
    const cx = 120, cy = 120, rO = 92, rI = 58;
    const segs = order.map(k=>{
      const v = statusCounts[k] || 0;
      const frac = v / total;
      const a1 = angle;
      const a2 = angle + frac * 360;
      angle = a2;
      if (v <= 0) return "";
      const d = describeDonutArc(cx, cy, rO, rI, a1, a2);
      const mid = (a1 + a2) / 2;
      const pt = polarToCartesian(cx, cy, 115, mid);
      return `
        <path d="${d}" fill="url(#${pat[k]})" stroke="#111827" stroke-width="1.2"><title>${k}：${v}</title></path>
        <text class="num" x="${pt.x}" y="${pt.y}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="1000" fill="#111827">${v}</text>
      `;
    }).join("");
    const legend = order.map(k=>{
      const v = statusCounts[k] || 0;
      return `<div style="display:flex;align-items:center;gap:8px;font-weight:1000;font-size:12px;"><span style="width:14px;height:14px;border:1px solid #111827;border-radius:4px;display:inline-block;background: repeating-linear-gradient(0deg, #fff, #fff);"><svg width="14" height="14" viewBox="0 0 14 14" style="display:block;"><rect x="0" y="0" width="14" height="14" fill="url(#${pat[k]})" stroke="#111827" stroke-width="0.8"></rect></svg></span><span>${escapeHtml(k)}</span><span class="num" style="margin-left:auto;color:#111827;">${v}</span></div>`;
    }).join("");
    return `
      <div class="card">
        <div class="chartTitle"><span>狀態圓餅圖</span><small class="num">總計 ${total}</small></div>
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
          <div class="svgWrap" style="max-width:260px;">
            <svg viewBox="0 0 240 240" role="img">
              <defs>
                <pattern id="patSolid" width="6" height="6" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#111827"></rect></pattern>
                <pattern id="patGray" width="6" height="6" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#d1d5db"></rect></pattern>
                <pattern id="patDiag" width="10" height="10" patternUnits="userSpaceOnUse"><rect width="10" height="10" fill="#ffffff"></rect><path d="M-2 10 L10 -2 M0 12 L12 0" stroke="#111827" stroke-width="2.2"></path></pattern>
                <pattern id="patLightDiag" width="10" height="10" patternUnits="userSpaceOnUse"><rect width="10" height="10" fill="#f3f4f6"></rect><path d="M-2 10 L10 -2 M0 12 L12 0" stroke="#111827" stroke-width="1.2"></path></pattern>
                <pattern id="patDots" width="10" height="10" patternUnits="userSpaceOnUse"><rect width="10" height="10" fill="#ffffff"></rect><circle cx="2" cy="2" r="1.6" fill="#111827"></circle><circle cx="7" cy="7" r="1.6" fill="#111827"></circle></pattern>
                <pattern id="patCross" width="10" height="10" patternUnits="userSpaceOnUse"><rect width="10" height="10" fill="#ffffff"></rect><path d="M0 0 L10 10 M10 0 L0 10" stroke="#111827" stroke-width="1.8"></path></pattern>
              </defs>
              ${segs}
              <circle cx="120" cy="120" r="56" fill="#ffffff" stroke="#111827" stroke-width="1.2"></circle>
              <text x="120" y="118" text-anchor="middle" font-size="12" font-weight="1100" fill="#111827">總單量</text>
              <text class="num" x="120" y="138" text-anchor="middle" font-size="18" font-weight="1200" fill="#111827">${total}</text>
            </svg>
          </div>
          <div style="flex:1 1 260px;display:flex;flex-direction:column;gap:8px;">${legend}<div class="subHint">黑=完成；斜線=待處理；點=未完成。</div></div>
        </div>
      </div>
    `;
  }

// ==========================================
  // 修正版：解決右側裁切 + 新增個人客單價
  // ==========================================
  function svgStackedLeaderboard(rows, metric, title, note){
    const topN = 10;
    const list = rows.filter(x => x.person !== CONFIG.person.placeholderName).slice(0);
    
    // 排序邏輯保持不變
    const sortMetric = document.getElementById("sortMetric").value;
    list.sort((a,b)=>{
      const av = sortMetric==="money" ? (a.soloMoney + a.teamMoney) : (a.soloCount + a.teamCount);
      const bv = sortMetric==="money" ? (b.soloMoney + b.teamMoney) : (b.soloCount + b.teamCount);
      return (bv-av) || String(a.person).localeCompare(String(b.person),"zh-Hant");
    });

    const top = list.slice(0, topN);
    // 計算最大值用來畫圖
    const totalOf = (x) => metric === "money" ? (x.soloMoney + x.teamMoney) : (x.soloCount + x.teamCount);
    const maxV = Math.max(1, ...top.map(totalOf));

    // ✅ 修改點 1：加大 rightPad 避免文字被切到
    const rowH = 36, leftPad = 120, rightPad = 180, barMax = 500; 
    // barMax 稍微縮小一點 (600->500) 讓畫面更緊湊，留空間給文字
    
    const h = top.length * rowH + 56;
    const w = leftPad + barMax + rightPad; // 總寬度會自動變大

    const bars = top.map((x,i)=>{
      const solo = metric==="money" ? x.soloMoney : x.soloCount;
      const team = metric==="money" ? x.teamMoney : x.teamCount;
      const tot  = Math.max(0.000001, solo + team);
      
      // 計算長條圖寬度
      const bwTot = Math.round((tot/maxV) * barMax);
      const bwSolo = Math.round(bwTot * (solo/tot));
      const bwTeam = Math.max(0, bwTot - bwSolo);
      const y = 18 + i*rowH;

      // ✅ 修改點 2：計算個人客單價 (AOV)
      const personAov = x.totalCount > 0 ? Math.round(x.totalMoney / x.totalCount) : 0;
      
      // ✅ 修改點 3：文字顯示邏輯
      let numText = "";
      let labelColor = "#111827"; // 預設黑色

      if (metric === "money") {
        // 如果是金額榜，顯示：總金額 (均$客單價)
        numText = `總$${fmtMoney(tot)} (均$${fmtMoney(personAov)})`;
        // 小彩蛋：如果客單價特別高(例如大於全體平均)，可以用不同顏色標示，這裡先維持簡單
      } else {
        // 如果是件數榜，顯示：總件數
        numText = `總${Math.round(tot)}件`;
      }

      return `
        <text x="0" y="${y+22}" font-size="13" font-weight="1000" fill="#111827">${escapeHtml(x.person)}</text>
        
        <rect x="${leftPad}" y="${y+9}" width="${bwSolo}" height="18" rx="9" fill="#111827">
           <title>單人: ${fmtMoney(solo)}</title>
        </rect>
        
        <rect x="${leftPad + bwSolo}" y="${y+9}" width="${bwTeam}" height="18" rx="9" 
              fill="url(#patTeam)" stroke="#111827" stroke-width="1">
           <title>協作: ${fmtMoney(team)}</title>
        </rect>

        <text class="num" x="${leftPad + bwTot + 8}" y="${y+22}" 
              font-size="12" font-weight="1000" fill="${labelColor}">${numText}</text>
      `;
    }).join("");

    return `
      <div class="card">
        <div class="chartTitle">
          <span>${escapeHtml(title)}</span>
          <small>黑=單人｜斜=協作</small>
        </div>
        <div class="svgWrap">
          <svg viewBox="0 0 ${w} ${h}" role="img">
            <defs>
              <pattern id="patTeam" width="10" height="10" patternUnits="userSpaceOnUse">
                <rect width="10" height="10" fill="#ffffff"></rect>
                <path d="M-2 10 L10 -2 M0 12 L12 0" stroke="#111827" stroke-width="2.2"></path>
              </pattern>
            </defs>
            ${bars}
            
            <rect x="${leftPad}" y="${h-26}" width="18" height="12" rx="3" fill="#111827"></rect>
            <text x="${leftPad+26}" y="${h-16}" font-size="12" font-weight="1000" fill="#111827">單人</text>
            
            <rect x="${leftPad+90}" y="${h-26}" width="18" height="12" rx="3" fill="url(#patTeam)" stroke="#111827" stroke-width="1"></rect>
            <text x="${leftPad+118}" y="${h-16}" font-size="12" font-weight="1000" fill="#111827">協作</text>
          </svg>
        </div>
        <div class="subHint">${escapeHtml(note)}</div>
      </div>
    `;
  }
  function svgDailyTrend(series, title){
    const w = 900, h = 240;
    const padL=44, padR=18, padT=18, padB=44;
    const plotW = w - padL - padR;
    const plotH = h - padT - padB;
    const maxX = 31;
    const maxY = Math.max(1, ...series.map(p=>p.v));
    const pts = series.map((p,idx)=>{
      const x = padL + ((p.day-1)/(maxX-1))*plotW;
      const y = padT + (1 - (p.v/maxY))*plotH;
      return {x,y, v:p.v, d:p.day};
    });
    const dPath = pts.map((p,i)=> (i===0?`M ${p.x.toFixed(2)} ${p.y.toFixed(2)}`:`L ${p.x.toFixed(2)} ${p.y.toFixed(2)}`)).join(" ");
    return `
      <div class="card">
        <div class="chartTitle"><span>${escapeHtml(title)}</span><small class="num">max ${Math.round(maxY)}</small></div>
        <div class="svgWrap">
          <svg viewBox="0 0 ${w} ${h}" role="img">
            <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}" stroke="#111827" stroke-width="1.2"></line>
            <line x1="${padL}" y1="${padT+plotH}" x2="${padL+plotW}" y2="${padT+plotH}" stroke="#111827" stroke-width="1.2"></line>
            ${[0.25,0.5,0.75].map(t=>`<line x1="${padL}" y1="${padT+(1-t)*plotH}" x2="${padL+plotW}" y2="${padT+(1-t)*plotH}" stroke="#e5e7eb" stroke-width="1"></line>`).join("")}
            <path d="${dPath}" fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round"></path>
            ${pts.filter((_,i)=> i%5===0).map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3.2" fill="#111827"><title>${p.d}日：${p.v}</title></circle>`).join("")}
            <text x="${padL}" y="${h-14}" font-size="12" font-weight="1000" fill="#111827">1</text>
            <text x="${padL+plotW-10}" y="${h-14}" font-size="12" font-weight="1000" fill="#111827">31</text>
            <text class="num" x="${padL}" y="${padT+12}" font-size="12" font-weight="1000" fill="#111827">${Math.round(maxY)}</text>
          </svg>
        </div>
      </div>
    `;
  }

  // ✅ 新增：案由分佈圖
  function svgReasonBar(records, title){
    const map = {};
    let total = 0;
    for(const r of records){
      let t = normalizeText(getValue(r, CONFIG.fields.reason)) || "未填事項";
      // 簡易取前8個字避免太長
      if(t.length > 8) t = t.substring(0,8) + "...";
      map[t] = (map[t]||0) + 1;
      total++;
    }
    const list = Object.entries(map).map(([k,v])=>({name:k, v})).sort((a,b)=>b.v - a.v).slice(0, 5); 
    if(list.length === 0) return "";
    const maxV = list[0].v;
    const w = 400, rowH = 30, topPad = 30;
    const h = list.length * rowH + topPad + 20;
    const barMaxW = 200, textLeftW = 120;
    const bars = list.map((item, i)=>{
      const y = topPad + i*rowH;
      const barW = Math.max(2, (item.v / maxV) * barMaxW);
      const pct = Math.round((item.v / total) * 100);
      return `
        <text x="${textLeftW - 10}" y="${y+16}" text-anchor="end" font-size="12" font-weight="1000" fill="#111827">${escapeHtml(item.name)}</text>
        <rect x="${textLeftW}" y="${y+4}" width="${barW}" height="18" rx="4" fill="#111827"></rect>
        <text x="${textLeftW + barW + 8}" y="${y+18}" font-size="12" font-weight="1000" fill="#111827">${item.v} (${pct}%)</text>
      `;
    }).join("");
    return `
      <div class="card">
        <div class="chartTitle"><span>${escapeHtml(title)}</span><small>Top 5 (共${total}件)</small></div>
        <div class="svgWrap"><svg viewBox="0 0 ${w} ${h}" role="img">${bars}</svg></div>
        <div class="subHint">老闆看這張：我們都在忙什麼？</div>
      </div>
    `;
  }

  // =============================
  // Main Logic
  // =============================
  async function loadFromRagic(){
    if (!CONFIG.apiKey || !CONFIG.baseUrl){
      document.getElementById("dashArea").innerHTML = `<div class="err">請先填 CONFIG.apiKey / CONFIG.baseUrl</div>`;
      return;
    }
    try{
      setLoading(true);
      document.getElementById("dashArea").innerHTML = `<div class="card">資料讀取中...</div>`;
      document.getElementById("detailsArea").innerHTML = "";
      const params = new URLSearchParams();
      params.set("api","");
      params.set("APIKey", CONFIG.apiKey);
      params.set("naming","EID");
      params.set("limit","5000");
      params.set("reverse","true");
      const url = `${CONFIG.baseUrl}?${params.toString()}`;
      const data = await jsonp(url);
      ALL_RECORDS = Object.values(data || {}).filter(v => v && typeof v === "object" && v._ragicId !== 0);
      setUpdatedNow();
      render();
    }catch(err){
      console.error(err);
      document.getElementById("dashArea").innerHTML = `<div class="err">讀取失敗，請檢查 API Key</div>`;
    }finally{
      setLoading(false);
    }
  }

  function render(){
    syncChips();
    const monthPick = document.getElementById("monthPick");
    if (!monthPick.value) monthPick.value = getThisMonthValue();
    const monthVal = monthPick.value;
    const monthKey = monthVal.replace("-", "/");
    const bossMode = document.getElementById("chkBossMode").checked;
    const moneyDoneOnly = document.getElementById("chkMoneyDoneOnly").checked;
    const splitMoney = document.getElementById("chkSplitMoney").checked;
    const showDetails = document.getElementById("chkShowDetails").checked;

    document.body.classList.toggle("bossHideNums", bossMode);
    document.getElementById("detailsArea").style.display = (showDetails && !bossMode) ? "block" : "none";

    const monthAll = ALL_RECORDS.filter(r => monthKeyFromRecord(r) === monthKey);
    if (!monthAll.length){
      document.getElementById("dashArea").innerHTML = `<div class="card">本月（${escapeHtml(monthKey)}）無資料</div>`;
      document.getElementById("detailsArea").innerHTML = "";
      document.getElementById("stats").innerText = `${monthKey}｜無資料`;
      return;
    }

    const statusCounts = { "已完成":0,"待處理":0,"未完成":0,"延期":0,"取消":0,"其他":0 };
    for (const r of monthAll){
      const st = statusBucket(getValue(r, CONFIG.fields.status));
      statusCounts[st] = (statusCounts[st]||0) + 1;
    }

    const pMap = new Map();
    const ensure = (p)=>{
      if (!pMap.has(p)) pMap.set(p, { person:p, soloCount:0, teamCount:0, soloMoney:0, teamMoney:0, tasks:[] });
      return pMap.get(p);
    };

    const dailyTotal = Array.from({length:31}, (_,i)=>({ day:i+1, v:0 }));
    const dailyDone  = Array.from({length:31}, (_,i)=>({ day:i+1, v:0 }));
    let doneOrders = 0;
    let totalOrders = 0;
    let totalMoney = 0;
    let moneyCount = 0;

    for (const r of monthAll){
      const d10 = date10(r);
      const day = d10 && d10.length>=10 ? Number(d10.substring(8,10)) : null;
      const statusRaw = normalizeText(getValue(r, CONFIG.fields.status));
      const isDone = statusRaw.includes("已完成");
      totalOrders++;
      if (day && day>=1 && day<=31) dailyTotal[day-1].v += 1;
      if (isDone){
        doneOrders++;
        if (day && day>=1 && day<=31) dailyDone[day-1].v += 1;
      }
      const persons = parsePersons(getValue(r, CONFIG.fields.person));
      const isSolo = persons.length === 1 && persons[0] !== CONFIG.person.placeholderName;
      const amt = parseAmount(getValue(r, CONFIG.fields.amount));
      const shouldCountMoney = (amt != null) && (!moneyDoneOnly || isDone);
      if (shouldCountMoney){
        totalMoney += amt;
        moneyCount += 1;
      }
      const shareN = Math.max(1, persons.length);
      for (const p of persons){
        const st = ensure(p);
        if (isSolo) st.soloCount += 1; else st.teamCount += 1;
        if (shouldCountMoney){
          if (isSolo) st.soloMoney += amt; else st.teamMoney += splitMoney ? (amt / shareN) : amt;
        }
        st.tasks.push({ date: d10, status: statusRaw, name: getValue(r, CONFIG.fields.name), reason: getValue(r, CONFIG.fields.reason), addr: getValue(r, CONFIG.fields.addr), amount: amt, persons });
      }
    }

    const rows = Array.from(pMap.values()).map(x=>{ x.totalCount = x.soloCount + x.teamCount; x.totalMoney = x.soloMoney + x.teamMoney; return x; });
    rows.sort((a,b)=> (b.totalMoney - a.totalMoney) || (b.totalCount - a.totalCount));

    const donePct = totalOrders ? (doneOrders/totalOrders*100) : 0;
    // ✅ 計算平均客單價 (AOV)
    const avgPrice = moneyCount > 0 ? Math.round(totalMoney / moneyCount) : 0;

    document.getElementById("stats").innerHTML = `
      ${escapeHtml(monthKey)}｜
      已完成 <span class="num">${doneOrders}</span>（${donePct.toFixed(1)}%）｜
      總單量 <span class="num">${totalOrders}</span>｜
      合計 <span class="num">${fmtMoney(totalMoney)}</span>｜
      <span class="highlight-stat">平均客單價 $${fmtMoney(avgPrice)}</span>
      <br/>規則：多人單拆人次｜${moneyDoneOnly?"金額只算已完成":"金額含未完成"}
    `;

    const dash = document.getElementById("dashArea");
    const donutHtml = svgStatusDonut(statusCounts);
    const moneyRank = svgStackedLeaderboard(rows, "money", "誰賺最多（Top 10 金額）", "錢從哪裡來？黑=單人，斜=協作。");
    const countRank = svgStackedLeaderboard(rows, "count", "誰做最多（Top 10 件數）", "誰是產能擔當？");
    // ✅ 插入 Reason Rank
    const reasonRank = svgReasonBar(monthAll, "主力業務分佈（Top 5 案由）");

    const trendTotal = svgDailyTrend(dailyTotal, "趨勢（總單量）");
    const trendDone  = svgDailyTrend(dailyDone,  "趨勢（已完成）");

    dash.innerHTML = `
      ${donutHtml}
      <div class="grid">
        ${moneyRank}
        ${countRank}
        ${reasonRank}
        <div class="card" style="display:flex;align-items:center;justify-content:center;color:#6b7280;font-weight:900;font-size:13px;">
           💡 提示：高單價+高件數=王牌；低單價+高件數=苦勞。<br>檢查「客單價」來調整業務方向。
        </div>
        ${trendTotal}
        ${trendDone}
      </div>
    `;

    // details
    const detailsArea = document.getElementById("detailsArea");
    if (!showDetails || bossMode){ detailsArea.innerHTML = ""; return; }
    
    const cards = rows.filter(x => x.person !== CONFIG.person.placeholderName).slice(0, 12).map(p=>{
      const ts = (p.tasks || []).sort((a,b)=> String(a.date).localeCompare(String(b.date)));
      const taskHtml = ts.slice(0, 8).map(t=>`
        <div class="task">
          <div class="taskTop"><div>${escapeHtml(t.name)}</div><div class="tag">${escapeHtml(t.status)}</div></div>
          <div style="margin-top:6px;font-weight:1000;">${escapeHtml(t.reason)}</div>
          <div class="muted" style="margin-top:6px;">📅 ${t.date}｜💰 <span class="num">${t.amount?fmtMoney(t.amount):"-"}</span></div>
        </div>
      `).join("");
      return `
        <details class="person">
          <summary class="personHead">
            <div>${escapeHtml(p.person)}</div>
            <div class="pill"><span class="num">$${fmtMoney(p.totalMoney)} / ${p.totalCount}件</span></div>
          </summary>
          <div class="personBody">${taskHtml || `<div class="muted">無</div>`}</div>
        </details>
      `;
    }).join("");
    detailsArea.innerHTML = `<div class="card"><div class="chartTitle"><span>明細（Top 12）</span></div><div style="display:flex;flex-direction:column;gap:10px;">${cards}</div></div>`;
  }

  function init(){
    document.getElementById("monthPick").value = getThisMonthValue();
    document.querySelectorAll("input, select").forEach(el => el.addEventListener("change", render));
    document.getElementById("btnReload").addEventListener("click", loadFromRagic);
    loadFromRagic();
  }
  init();
</script>
